version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autopilot
      POSTGRES_USER: autopilot
      POSTGRES_PASSWORD: autopilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  control-plane-api:
    build:
      context: ..
      dockerfile: apps/control-plane-api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://autopilot:autopilot@postgres:5432/autopilot?sslmode=disable"
      JWT_SECRET: "dev-secret-change-in-production"
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
