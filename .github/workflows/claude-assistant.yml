name: "[Agent] Claude Code Assistant"
run-name: "Claude responding to @claude mention"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-assistant-${{ github.event.issue.number || github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  respond:
    name: "Claude Code Response"
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body || '', '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body || '', '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body || '', '@claude') || contains(github.event.issue.title || '', '@claude')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract prompt
        id: prompt
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || github.event.issue.body || '' }}
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
        run: |
          CLEAN=$(echo "$COMMENT_BODY" | sed 's/@claude//g' | head -c 2000)
          {
            echo "prompt<<EOF"
            echo "$CLEAN"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"

      - name: "Check API key availability"
        id: check_key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning ::ANTHROPIC_API_KEY secret is not configured"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        if: steps.check_key.outputs.has_key == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.RELEASE_TOKEN || github.token }}
          prompt: |
            Context: Autopilot CI/CD control plane for multi-workspace release orchestration.
            Read CLAUDE.md for full project documentation.
            Read contracts/claude-session-memory.json for current state.

            Issue/PR title: ${{ steps.prompt.outputs.title }}
            User request: ${{ steps.prompt.outputs.prompt }}

            Execute the request autonomously. If it involves code changes, create a PR.
            If it involves diagnosis, report findings as a comment.
        env:
          BBVINET_TOKEN: ${{ secrets.BBVINET_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: "Fallback comment if no API key"
        if: steps.check_key.outputs.has_key == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number || github.event.pull_request.number }}"
          if [ -n "$ISSUE_NUM" ]; then
            gh api "repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" \
              --method POST \
              -f "body=⚠️ **Claude Code Assistant**: \`ANTHROPIC_API_KEY\` secret is not configured. Please add it in Settings → Secrets → Actions to enable @claude responses.

          _This is an automated message from \`claude-assistant.yml\`._" 2>/dev/null || true
          fi
