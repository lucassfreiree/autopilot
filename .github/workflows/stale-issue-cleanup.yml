name: "[Infra] Stale Issue Cleanup"
run-name: "${{ github.workflow }} • cleanup stale issues"

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: stale-issue-cleanup
  cancel-in-progress: true

jobs:
  cleanup:
    name: "Cleanup Stale Issues"
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: "1. Find and process stale issues"
        run: |
          set -e
          NOW_EPOCH=$(date -u +%s)
          STALE_DAYS=14
          WARNING_DAYS=7
          CLOSED=0
          WARNED=0

          echo "=== Scanning open issues ==="

          # Get all open issues (up to 100)
          ISSUES=$(gh api "repos/$REPO/issues?state=open&per_page=100&sort=updated&direction=asc" \
            --jq '[.[] | select(.pull_request == null) | {number: .number, title: .title, updated_at: .updated_at, labels: [.labels[].name], created_at: .created_at}]' 2>/dev/null || echo '[]')

          TOTAL=$(echo "$ISSUES" | jq 'length')
          echo "Found $TOTAL open issues"

          echo "$ISSUES" | jq -c '.[]' 2>/dev/null | while read -r issue; do
            NUM=$(echo "$issue" | jq -r '.number')
            TITLE=$(echo "$issue" | jq -r '.title')
            UPDATED=$(echo "$issue" | jq -r '.updated_at')
            LABELS=$(echo "$issue" | jq -r '.labels | join(",")')

            # Skip issues with "keep-open" or "pinned" label
            if echo "$LABELS" | grep -qiE 'keep-open|pinned|do-not-close'; then
              echo "  #$NUM: SKIP (protected label)"
              continue
            fi

            UPDATED_EPOCH=$(date -d "$UPDATED" +%s 2>/dev/null || echo "0")
            AGE_DAYS=$(( (NOW_EPOCH - UPDATED_EPOCH) / 86400 ))

            if [ "$AGE_DAYS" -ge "$STALE_DAYS" ]; then
              # Close stale issues (14+ days without activity)
              CLOSE_BODY="This issue has been automatically closed after ${AGE_DAYS} days of inactivity. If it is still relevant, reopen it with a comment."
              gh api "repos/$REPO/issues/$NUM/comments" --method POST -f "body=$CLOSE_BODY" > /dev/null 2>&1
              gh api "repos/$REPO/issues/$NUM" --method PATCH -f state=closed -f "labels[]=$LABELS" > /dev/null 2>&1
              echo "  #$NUM: CLOSED ($AGE_DAYS days stale) - $TITLE"
              CLOSED=$((CLOSED + 1))

            elif [ "$AGE_DAYS" -ge "$WARNING_DAYS" ]; then
              # Check if we already warned (avoid spam)
              ALREADY_WARNED=$(gh api "repos/$REPO/issues/$NUM/comments?per_page=5" \
                --jq '[.[] | select(.body | contains("automatically closed"))] | length' 2>/dev/null || echo "0")
              if [ "$ALREADY_WARNED" = "0" ]; then
                WARN_BODY="This issue will be automatically closed in $((STALE_DAYS - AGE_DAYS)) days if there is no activity. Add the label \`keep-open\` to prevent auto-closure."
                gh api "repos/$REPO/issues/$NUM/comments" --method POST -f "body=$WARN_BODY" > /dev/null 2>&1
                echo "  #$NUM: WARNED ($AGE_DAYS days, closing in $((STALE_DAYS - AGE_DAYS))d) - $TITLE"
                WARNED=$((WARNED + 1))
              fi
            else
              echo "  #$NUM: OK ($AGE_DAYS days) - $TITLE"
            fi
          done

          echo ""
          echo "=== Summary ==="
          echo "Closed: $CLOSED issues"
          echo "Warned: $WARNED issues"

          echo "## Stale Issue Cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total open issues | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Closed (stale) | $CLOSED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Warned | $WARNED |" >> "$GITHUB_STEP_SUMMARY"
