name: "[Core] CI Monitor Loop"
run-name: "${{ github.workflow }} • ${{ github.event_name }} • ${{ github.event.workflow_run.conclusion || 'manual' }} • ref=${{ github.ref_name }}"

# Closed-loop CI monitor: triggers after apply-source-change completes, polls the
# corporate CI (Esteira de Build NPM), then automatically promotes (success) or
# diagnoses + fixes (failure). Zero manual intervention required.

on:
  workflow_run:
    workflows:
      - "[Corp] Deploy: Apply Source Change"
    types: [completed]
  workflow_dispatch:
    inputs:
      workspace_id:
        description: "Workspace ID"
        required: true
        default: "ws-default"
        type: choice
        options:
          - ws-default
          - ws-cit
      component:
        description: "Component to monitor (controller or agent)"
        required: true
        type: choice
        options:
          - controller
          - agent
      commit_sha:
        description: "Commit SHA to check in corporate repo (leave empty to read from state)"
        required: false
      version:
        description: "Version being deployed (leave empty to read from state)"
        required: false

permissions:
  contents: write
  actions: write

concurrency:
  # Use component+workspace to allow parallel monitoring of controller and agent
  # For workflow_run events we include the triggering run id to avoid slot reuse
  group: ci-monitor-${{ github.event.inputs.workspace_id || 'ws-default' }}-${{ github.event.inputs.component || github.event.workflow_run.id }}
  cancel-in-progress: false

env:
  AUTOPILOT_REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state
  # Two-phase polling: fast (30s x 10 = 5 min) then slow (120s x 12 = 24 min)
  # Total window: ~29 min. Fast phase catches quick failures (<5 min).
  POLL_INTERVAL_FAST: 30
  FAST_ATTEMPTS: 10
  POLL_INTERVAL_SLOW: 120
  SLOW_ATTEMPTS: 12

jobs:
  monitor:
    name: "Monitor Corporate CI"
    # Only run when apply-source-change succeeded (or manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      # ── 1. Resolve inputs ────────────────────────────────────────────────────
      - name: "Read deploy state / inputs"
        id: inputs
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -e

          read_state() {
            gh api \
              "repos/$AUTOPILOT_REPO/contents/state/workspaces/${WS_ID}/${1}-release-state.json?ref=$STATE_BRANCH" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}'
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            WS_ID="${{ github.event.inputs.workspace_id }}"
            COMPONENT="${{ github.event.inputs.component }}"
            COMMIT_SHA="${{ github.event.inputs.commit_sha }}"
            VERSION="${{ github.event.inputs.version }}"

            if [ -n "$COMPONENT" ] && { [ -z "$COMMIT_SHA" ] || [ -z "$VERSION" ] || [ "$VERSION" = "source-change" ]; }; then
              STATE=$(read_state "$COMPONENT")
              [ -z "$COMMIT_SHA" ] && COMMIT_SHA=$(echo "$STATE" | jq -r '.lastReleasedSha // ""')
              if [ -z "$VERSION" ] || [ "$VERSION" = "source-change" ]; then
                VERSION=$(echo "$STATE" | jq -r '.lastTag // ""')
              fi
            fi
          else
            # Triggered by apply-source-change — read last release state for each component.
            # apply-source-change runs only for ws-default today; extend here when other
            # workspaces gain a corporate CI pipeline.
            WS_ID="ws-default"
            COMMIT_SHA=""
            VERSION=""
            COMPONENT=""

            for COMP in controller agent; do
              STATE=$(read_state "$COMP")

              RUN_ID=$(echo "$STATE" | jq -r '.runId // ""')
              TRIGGER_RUN="${{ github.event.workflow_run.id }}"

              # Match the state entry that was written by this specific run
              if [ "$RUN_ID" = "$TRIGGER_RUN" ]; then
                COMPONENT="$COMP"
                COMMIT_SHA=$(echo "$STATE" | jq -r '.lastReleasedSha // ""')
                VERSION=$(echo "$STATE" | jq -r '.lastTag // ""')
                echo "Matched component=$COMPONENT sha=$COMMIT_SHA version=$VERSION (run=$RUN_ID)"
                break
              fi
            done

            # Fallback: read the most recently updated component state
            if [ -z "$COMPONENT" ]; then
              echo "::warning ::Could not match run ID to a release state entry; falling back to most recent controller state."
              COMPONENT="controller"
              STATE=$(read_state "$COMPONENT")
              COMMIT_SHA=$(echo "$STATE" | jq -r '.lastReleasedSha // ""')
              VERSION=$(echo "$STATE" | jq -r '.lastTag // ""')
            fi
          fi

          # Validate
          if [ -z "$COMPONENT" ] || [ "$COMPONENT" = "null" ]; then
            echo "::error ::Could not determine component to monitor."
            exit 1
          fi
          if [ -z "$COMMIT_SHA" ] || [ "$COMMIT_SHA" = "null" ]; then
            echo "::warning ::No commit SHA available — will monitor latest workflow run instead."
            COMMIT_SHA=""
          fi

          # Read workspace config to get source repo URL
          WS_JSON=$(gh api \
            "repos/$AUTOPILOT_REPO/contents/state/workspaces/${WS_ID}/workspace.json?ref=$STATE_BRANCH" \
            --jq '.content' | base64 -d)
          SOURCE_REPO=$(echo "$WS_JSON" | jq -r ".${COMPONENT}.sourceRepo // \"\"")
          SOURCE_BRANCH=$(echo "$WS_JSON" | jq -r ".${COMPONENT}.deployBranch // \"main\"")
          CI_WORKFLOW_NAME=$(echo "$WS_JSON" | jq -r ".${COMPONENT}.ciWorkflowName // \"\"")
          CAP_REPO=$(echo "$WS_JSON" | jq -r ".${COMPONENT}.capRepo // \"\"")
          CAP_BRANCH=$(echo "$WS_JSON" | jq -r ".${COMPONENT}.capBranch // \"main\"")
          CAP_VALUES=$(echo "$WS_JSON" | jq -r ".${COMPONENT}.capValuesPath // \"\"")
          IMAGE_PATTERN=$(echo "$WS_JSON" | jq -r ".${COMPONENT}.imagePattern // \"\"")

          echo "ws_id=$WS_ID"          >> "$GITHUB_OUTPUT"
          echo "component=$COMPONENT"  >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "source_repo=$SOURCE_REPO" >> "$GITHUB_OUTPUT"
          echo "source_branch=$SOURCE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "ci_workflow_name=$CI_WORKFLOW_NAME" >> "$GITHUB_OUTPUT"
          echo "cap_repo=$CAP_REPO" >> "$GITHUB_OUTPUT"
          echo "cap_branch=$CAP_BRANCH" >> "$GITHUB_OUTPUT"
          echo "cap_values=$CAP_VALUES" >> "$GITHUB_OUTPUT"
          echo "image_pattern=$IMAGE_PATTERN" >> "$GITHUB_OUTPUT"

          echo "=== Monitor: ws=$WS_ID component=$COMPONENT sha=$COMMIT_SHA version=$VERSION repo=$SOURCE_REPO branch=$SOURCE_BRANCH workflow=${CI_WORKFLOW_NAME:-any} cap_repo=${CAP_REPO:-none} ==="

      # ── 2. Poll corporate CI ─────────────────────────────────────────────────
      - name: "Poll corporate CI"
        id: poll
        env:
          # BBVINET_TOKEN is the Getronics corporate CI token.
          # For other workspaces, add token selection based on ws_id when needed.
          BBVINET_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          set -e

          SOURCE_REPO="${{ steps.inputs.outputs.source_repo }}"
          COMMIT_SHA="${{ steps.inputs.outputs.commit_sha }}"
          COMPONENT="${{ steps.inputs.outputs.component }}"
          CI_WORKFLOW_NAME="${{ steps.inputs.outputs.ci_workflow_name }}"

          if [ -z "$SOURCE_REPO" ] || [ "$SOURCE_REPO" = "null" ]; then
            echo "::error ::No source repo configured for $COMPONENT — cannot poll CI."
            exit 1
          fi

          OVERALL="unknown"
          SUCCESS_RUN_ID=""
          SUCCESS_RUN_URL=""
          SUCCESS_RUN_NAME=""
          FAILED_RUN_URL=""
          MONITOR_STRATEGY="workflow-name-exact"
          ACTIVE_SIGNALS=""
          CHECK_RUNS_SUMMARY=""
          TOTAL_ATTEMPTS=$(( FAST_ATTEMPTS + SLOW_ATTEMPTS ))

          for ATTEMPT in $(seq 1 $TOTAL_ATTEMPTS); do
            # Two-phase polling: fast first (30s), then slow (120s)
            if [ "$ATTEMPT" -le "$FAST_ATTEMPTS" ]; then
              PHASE="fast"
              INTERVAL="$POLL_INTERVAL_FAST"
            else
              PHASE="slow"
              INTERVAL="$POLL_INTERVAL_SLOW"
            fi
            echo "=== Attempt $ATTEMPT / $TOTAL_ATTEMPTS (${PHASE} phase, ${INTERVAL}s interval) ==="

            if [ -n "$COMMIT_SHA" ] && [ "$COMMIT_SHA" != "null" ]; then
              RAW_RUNS=$(GH_TOKEN="$BBVINET_TOKEN" gh api \
                "repos/$SOURCE_REPO/actions/runs?head_sha=${COMMIT_SHA}&per_page=10" \
                2>/dev/null || echo '{"workflow_runs":[]}')
            else
              # Fallback: check the last 5 runs in the repo
              RAW_RUNS=$(GH_TOKEN="$BBVINET_TOKEN" gh api \
                "repos/$SOURCE_REPO/actions/runs?per_page=5" \
                2>/dev/null || echo '{"workflow_runs":[]}')
            fi

            if [ -n "$CI_WORKFLOW_NAME" ] && [ "$CI_WORKFLOW_NAME" != "null" ]; then
              RUNS=$(echo "$RAW_RUNS" | jq --arg wf "$CI_WORKFLOW_NAME" '{workflow_runs: [.workflow_runs[] | select(.name == $wf)]}')
              FILTERED_TOTAL=$(echo "$RUNS" | jq '.workflow_runs | length')
              RAW_TOTAL=$(echo "$RAW_RUNS" | jq '.workflow_runs | length')
              if [ "$FILTERED_TOTAL" -eq 0 ] && [ "$RAW_TOTAL" -gt 0 ]; then
                RUNS="$RAW_RUNS"
                MONITOR_STRATEGY="workflow-sha-fallback-any-name"
              else
                MONITOR_STRATEGY="workflow-name-exact"
              fi
            else
              RUNS="$RAW_RUNS"
              MONITOR_STRATEGY="workflow-sha-any-name"
            fi

            TOTAL=$(echo "$RUNS"       | jq '.workflow_runs | length')
            IN_PROG=$(echo "$RUNS"     | jq '[.workflow_runs[] | select(.status != "completed")] | length')
            SUCCESS=$(echo "$RUNS"     | jq '[.workflow_runs[] | select(.conclusion == "success")] | length')
            FAILED=$(echo "$RUNS"      | jq '[.workflow_runs[] | select(.conclusion == "failure")] | length')
            SUCCESS_RUN_ID=$(echo "$RUNS" | jq -r '[.workflow_runs[] | select(.conclusion == "success")] | first | .id // ""')
            SUCCESS_RUN_URL=$(echo "$RUNS" | jq -r '[.workflow_runs[] | select(.conclusion == "success")] | first | .html_url // ""')
            SUCCESS_RUN_NAME=$(echo "$RUNS" | jq -r '[.workflow_runs[] | select(.conclusion == "success")] | first | .name // ""')
            FAILED_RUN_URL=$(echo "$RUNS" | jq -r '[.workflow_runs[] | select(.conclusion == "failure")] | first | .html_url // ""')

            echo "  total=$TOTAL in_progress=$IN_PROG success=$SUCCESS failed=$FAILED workflow=${CI_WORKFLOW_NAME:-any}"

            if [ "$TOTAL" -gt 0 ] && [ "$IN_PROG" -gt 0 ]; then
              ACTIVE_SIGNALS=$(echo "$RUNS" | jq -r '[.workflow_runs[] | select(.status != "completed") | .name] | unique | join(", ")')
              [ -z "$ACTIVE_SIGNALS" ] && ACTIVE_SIGNALS="workflow-run-pending"
            fi

            if [ "$TOTAL" -eq 0 ] && [ -n "$COMMIT_SHA" ] && [ "$COMMIT_SHA" != "null" ]; then
              CHECKS=$(GH_TOKEN="$BBVINET_TOKEN" gh api \
                "repos/$SOURCE_REPO/commits/${COMMIT_SHA}/check-runs?per_page=100" \
                2>/dev/null || echo '{"total_count":0,"check_runs":[]}')

              CHECK_TOTAL=$(echo "$CHECKS" | jq '.check_runs | length')
              CHECK_IN_PROG=$(echo "$CHECKS" | jq '[.check_runs[] | select(.status != "completed")] | length')
              CHECK_FAIL=$(echo "$CHECKS" | jq '[.check_runs[] | select(.status == "completed" and (.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled" or .conclusion == "action_required" or .conclusion == "startup_failure"))] | length')
              CHECK_RUNS_SUMMARY=$(echo "$CHECKS" | jq -r '[.check_runs[] | "\(.name)=\(.status)/\(.conclusion // "null")"] | join("; ")')
              ACTIVE_SIGNALS=$(echo "$CHECKS" | jq -r '[.check_runs[] | select(.status != "completed") | .name] | unique | join(", ")')
              REQUIRED_NPM=$(echo "$CHECKS" | jq -r 'any(.check_runs[]?; (.name | ascii_downcase | test("workflow-npm")) and .conclusion == "success")')
              RELEASE_GATE_BLOCK=$(echo "$CHECKS" | jq -r 'any(.check_runs[]?; (.name | ascii_downcase | test("análise motor liberação|analise motor liberacao")) and .status != "completed")')
              RELEASE_GATE_FAIL=$(echo "$CHECKS" | jq -r 'any(.check_runs[]?; (.name | ascii_downcase | test("análise motor liberação|analise motor liberacao")) and (.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled" or .conclusion == "action_required" or .conclusion == "startup_failure"))')
              AUTO_DEPLOY_BLOCK=$(echo "$CHECKS" | jq -r 'any(.check_runs[]?; (.name | ascii_downcase | test("autodeploy|cd \\(desenvolvimento\\)")) and .status != "completed")')
              AUTO_DEPLOY_FAIL=$(echo "$CHECKS" | jq -r 'any(.check_runs[]?; (.name | ascii_downcase | test("autodeploy|cd \\(desenvolvimento\\)")) and (.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled" or .conclusion == "action_required" or .conclusion == "startup_failure"))')

              MONITOR_STRATEGY="check-runs-fallback"
              echo "  workflow run not found — fallback to check-runs: total=$CHECK_TOTAL in_progress=$CHECK_IN_PROG fail=$CHECK_FAIL"

              if [ "$CHECK_TOTAL" -eq 0 ]; then
                echo "  No check-runs found yet — waiting..."
                OVERALL="pending"
              elif [ "$CHECK_FAIL" -gt 0 ] || [ "$RELEASE_GATE_FAIL" = "true" ] || [ "$AUTO_DEPLOY_FAIL" = "true" ]; then
                OVERALL="failure"
                echo "  Check-runs FAILED ❌"
                break
              elif [ "$CHECK_IN_PROG" -eq 0 ] && [ "$REQUIRED_NPM" = "true" ] && [ "$RELEASE_GATE_BLOCK" != "true" ] && [ "$AUTO_DEPLOY_BLOCK" != "true" ]; then
                OVERALL="success"
                echo "  Check-runs PASSED ✅"
                break
              else
                OVERALL="in_progress"
                echo "  Check-runs still running..."
              fi
            elif [ "$TOTAL" -eq 0 ]; then
              echo "  No matching workflow run found yet — waiting..."
              OVERALL="pending"
              ACTIVE_SIGNALS="workflow-run-not-found"
            elif [ "$SUCCESS" -gt 0 ] && [ "$IN_PROG" -eq 0 ]; then
              OVERALL="success"
              echo "  CI PASSED ✅"
              break
            elif [ "$FAILED" -gt 0 ] && [ "$IN_PROG" -eq 0 ]; then
              OVERALL="failure"
              echo "  CI FAILED ❌ (detected in ${PHASE} phase at attempt $ATTEMPT)"
              break
            else
              OVERALL="in_progress"
              echo "  CI still running..."
            fi

            if [ "$ATTEMPT" -lt "$TOTAL_ATTEMPTS" ]; then
              echo "  Sleeping ${INTERVAL}s..."
              sleep "$INTERVAL"
            fi
          done

          if [ "$OVERALL" = "in_progress" ] || [ "$OVERALL" = "pending" ] || [ "$OVERALL" = "unknown" ]; then
            echo "::warning ::CI did not complete within the polling window ($TOTAL_ATTEMPTS attempts, fast=${FAST_ATTEMPTS}x${POLL_INTERVAL_FAST}s + slow=${SLOW_ATTEMPTS}x${POLL_INTERVAL_SLOW}s). Marking as timeout."
            OVERALL="timeout"
          fi

          echo "overall=$OVERALL"            >> "$GITHUB_OUTPUT"
          echo "success_run_id=$SUCCESS_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "success_run_url=$SUCCESS_RUN_URL" >> "$GITHUB_OUTPUT"
          echo "success_run_name=$SUCCESS_RUN_NAME" >> "$GITHUB_OUTPUT"
          echo "failed_run_url=$FAILED_RUN_URL" >> "$GITHUB_OUTPUT"
          echo "monitor_strategy=$MONITOR_STRATEGY" >> "$GITHUB_OUTPUT"
          echo "active_signals=$ACTIVE_SIGNALS" >> "$GITHUB_OUTPUT"
          echo "check_runs_summary=$CHECK_RUNS_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "=== Final CI status: $OVERALL ==="

      # ── 3a. On success → verify publish evidence ─────────────────────────────
      - name: "Verify image publication"
        id: publish
        if: steps.poll.outputs.overall == 'success'
        env:
          BBVINET_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          set -e

          SOURCE_REPO="${{ steps.inputs.outputs.source_repo }}"
          VERSION="${{ steps.inputs.outputs.version }}"
          RUN_ID="${{ steps.poll.outputs.success_run_id }}"
          IMAGE_NAME=$(echo "$SOURCE_REPO" | awk -F/ '{print $2}')

          VERIFIED=false
          EVIDENCE=""

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::warning ::Successful workflow run not available for artifact verification."
          else
            JOBS=$(GH_TOKEN="$BBVINET_TOKEN" gh api \
              "repos/$SOURCE_REPO/actions/runs/$RUN_ID/jobs?per_page=100" \
              2>/dev/null || echo '{"jobs":[]}')

            JOB_IDS=$(echo "$JOBS" | jq -r '[.jobs[] | select((.name | ascii_downcase | test("publish|push|docker|image|build"))) | .id] | unique | .[]')
            if [ -z "$JOB_IDS" ]; then
              JOB_IDS=$(echo "$JOBS" | jq -r '[.jobs[] | .id] | .[:5] | .[]')
            fi

            for JOB_ID in $JOB_IDS; do
              JOB_NAME=$(echo "$JOBS" | jq -r --arg id "$JOB_ID" '.jobs[] | select((.id | tostring) == $id) | .name // ""')
              JOB_LOGS=$(GH_TOKEN="$BBVINET_TOKEN" gh api \
                "repos/$SOURCE_REPO/actions/jobs/$JOB_ID/logs" \
                2>/dev/null || echo "")

              HAS_VERSION=false
              HAS_PUBLISH=false

              echo "$JOB_LOGS" | grep -Fq "$VERSION" && HAS_VERSION=true || true
              echo "$JOB_LOGS" | grep -Eiq "docker\\.binarios\\.intranet|docker push|published|publish|registry|push refer|${IMAGE_NAME}:${VERSION}" && HAS_PUBLISH=true || true

              if [ "$HAS_VERSION" = "true" ] && [ "$HAS_PUBLISH" = "true" ]; then
                VERIFIED=true
                EVIDENCE="workflow=${{ steps.poll.outputs.success_run_name }} job=${JOB_NAME} run=${RUN_ID}"
                echo "Artifact verified via $JOB_NAME"
                break
              fi
            done
          fi

          echo "verified=$VERIFIED" >> "$GITHUB_OUTPUT"
          echo "evidence=$EVIDENCE" >> "$GITHUB_OUTPUT"

      - name: "Finalize monitor result"
        id: final
        if: always()
        run: |
          POLL_RESULT="${{ steps.poll.outputs.overall || 'unknown' }}"
          VERIFIED="${{ steps.publish.outputs.verified || 'false' }}"
          FINAL_RESULT="$POLL_RESULT"

          if [ "$POLL_RESULT" = "success" ] && [ "$VERIFIED" != "true" ]; then
            FINAL_RESULT="artifact-unverified"
          fi

          echo "overall=$FINAL_RESULT" >> "$GITHUB_OUTPUT"
          echo "=== Final monitored status: $FINAL_RESULT ==="

      - name: "Capture source head"
        id: source_head
        if: always()
        env:
          BBVINET_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          set -e

          SOURCE_REPO="${{ steps.inputs.outputs.source_repo }}"
          SOURCE_BRANCH="${{ steps.inputs.outputs.source_branch }}"
          COMMIT_SHA="${{ steps.inputs.outputs.commit_sha }}"
          CHECKED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          HEAD_SHA=""
          MATCHES="false"

          if [ -n "$SOURCE_REPO" ] && [ "$SOURCE_REPO" != "null" ]; then
            HEAD_SHA=$(GH_TOKEN="$BBVINET_TOKEN" gh api \
              "repos/$SOURCE_REPO/commits/$SOURCE_BRANCH" \
              --jq '.sha' 2>/dev/null || echo "")
          fi

          if [ -n "$HEAD_SHA" ] && [ -n "$COMMIT_SHA" ] && [ "$HEAD_SHA" = "$COMMIT_SHA" ]; then
            MATCHES="true"
          fi

          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "checked_at=$CHECKED_AT" >> "$GITHUB_OUTPUT"
          echo "matches_released=$MATCHES" >> "$GITHUB_OUTPUT"

      - name: "Check CAP alignment"
        id: cap_align
        if: steps.final.outputs.overall == 'success'
        env:
          GH_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          set -e

          CAP_REPO="${{ steps.inputs.outputs.cap_repo }}"
          CAP_BRANCH="${{ steps.inputs.outputs.cap_branch }}"
          CAP_VALUES="${{ steps.inputs.outputs.cap_values }}"
          IMAGE_PATTERN="${{ steps.inputs.outputs.image_pattern }}"
          VERSION="${{ steps.inputs.outputs.version }}"

          CONFIGURED=true
          ALIGNED=false
          EVIDENCE=""

          if [ -z "$CAP_REPO" ] || [ "$CAP_REPO" = "null" ] || [ -z "$CAP_VALUES" ] || [ "$CAP_VALUES" = "null" ]; then
            CONFIGURED=false
            EVIDENCE="cap-not-configured"
          else
            VALUES=$(gh api "repos/$CAP_REPO/contents/${CAP_VALUES}?ref=$CAP_BRANCH" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
            if [ -n "$VALUES" ]; then
              if [ -n "$IMAGE_PATTERN" ] && echo "$VALUES" | grep -Eq "${IMAGE_PATTERN}${VERSION}([[:space:]]|$|[\"'])"; then
                ALIGNED=true
              elif echo "$VALUES" | grep -Eq ":[\"']?${VERSION}([[:space:]]|$|[\"'])"; then
                ALIGNED=true
              fi
            fi

            if [ "$ALIGNED" = "true" ]; then
              EVIDENCE="repo=${CAP_REPO} path=${CAP_VALUES} tag=${VERSION}"
              echo "CAP already aligned to $VERSION"
            else
              EVIDENCE="repo=${CAP_REPO} path=${CAP_VALUES} tag-missing=${VERSION}"
              echo "CAP not yet aligned to $VERSION"
            fi
          fi

          echo "configured=$CONFIGURED" >> "$GITHUB_OUTPUT"
          echo "aligned=$ALIGNED" >> "$GITHUB_OUTPUT"
          echo "evidence=$EVIDENCE" >> "$GITHUB_OUTPUT"

      # ── 3b. On verified success → promote CAP ────────────────────────────────
      - name: "Trigger promote-cap (on success)"
        if: >
          steps.final.outputs.overall == 'success' &&
          steps.cap_align.outputs.configured == 'true' &&
          steps.cap_align.outputs.aligned != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          WS_ID="${{ steps.inputs.outputs.ws_id }}"
          COMPONENT="${{ steps.inputs.outputs.component }}"
          VERSION="${{ steps.inputs.outputs.version }}"

          echo "=== CI passed — promoting $COMPONENT $VERSION to CAP ==="

          gh workflow run promote-cap.yml \
            --repo "$AUTOPILOT_REPO" \
            --ref main \
            --field workspace_id="$WS_ID" \
            --field component="$COMPONENT" \
            --field version="$VERSION"

          echo "Promote-CAP workflow dispatched for $COMPONENT $VERSION."

      # ── 3c. On failure/timeout → diagnose + fix ───────────────────────────────
      - name: "Trigger ci-diagnose (on failure)"
        if: >
          steps.final.outputs.overall == 'failure' ||
          steps.final.outputs.overall == 'timeout'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          WS_ID="${{ steps.inputs.outputs.ws_id }}"
          COMPONENT="${{ steps.inputs.outputs.component }}"
          COMMIT_SHA="${{ steps.inputs.outputs.commit_sha }}"
          OVERALL="${{ steps.final.outputs.overall }}"

          echo "=== CI $OVERALL — diagnosing $COMPONENT ==="

          gh workflow run ci-diagnose.yml \
            --repo "$AUTOPILOT_REPO" \
            --ref main \
            --field workspace_id="$WS_ID" \
            --field component="$COMPONENT" \
            --field commit_sha="$COMMIT_SHA"

          echo "CI-diagnose dispatched for $COMPONENT (sha=$COMMIT_SHA)."

      # NOTE: fix-corporate-ci is now dispatched BY ci-diagnose (Step 10) AFTER
      # diagnosis is saved to state. This ensures fix-corporate-ci can read the
      # diagnosis and apply smarter fixes. Chain: ci-diagnose → fix-corporate-ci.
      # Previous behavior: both dispatched in parallel (fix couldn't read diagnosis).

      # ── 3d. Create failure notification issue ─────────────────────────────────
      - name: "Create CI failure notification issue"
        if: >
          steps.final.outputs.overall == 'failure' ||
          steps.final.outputs.overall == 'timeout' ||
          steps.final.outputs.overall == 'artifact-unverified'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          COMPONENT="${{ steps.inputs.outputs.component }}"
          VERSION="${{ steps.inputs.outputs.version }}"
          COMMIT_SHA="${{ steps.inputs.outputs.commit_sha }}"
          FAILED_URL="${{ steps.poll.outputs.failed_run_url }}"
          SUCCESS_URL="${{ steps.poll.outputs.success_run_url }}"
          OVERALL="${{ steps.final.outputs.overall }}"
          SOURCE_REPO="${{ steps.inputs.outputs.source_repo }}"
          PUBLISH_EVIDENCE="${{ steps.publish.outputs.evidence }}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Dedup: check if an open issue already exists for this component CI failure
          EXISTING_ISSUE=$(gh issue list \
            --repo "$AUTOPILOT_REPO" \
            --state open \
            --search "Corporate CI" \
            --json title,number \
            --jq "[.[] | select(.title | test(\"Corporate CI.*$COMPONENT\"))] | .[0].number // empty" \
            2>/dev/null || echo "")

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "::notice ::Existing CI failure issue #$EXISTING_ISSUE for $COMPONENT — adding comment instead"
            gh issue comment "$EXISTING_ISSUE" \
              --repo "$AUTOPILOT_REPO" \
              --body "**Update**: CI still failing at $NOW
          Outcome: $OVERALL | SHA: $COMMIT_SHA | Failed run: $FAILED_URL | Success run: $SUCCESS_URL
          Publish evidence: ${PUBLISH_EVIDENCE:-not-found}" \
              2>/dev/null || true
          else
            TITLE="[AutoPilot] Corporate CI $OVERALL: $COMPONENT $VERSION"
            BODY="Corporate pipeline requires remediation.

          Component: $COMPONENT
          Version: $VERSION
          Commit SHA: $COMMIT_SHA
          Source repo: $SOURCE_REPO
          Outcome: $OVERALL
          Failed run: $FAILED_URL
          Successful run: $SUCCESS_URL
          Publish evidence: ${PUBLISH_EVIDENCE:-not-found}

          Actions taken:
          - promotion blocked
          - ci-diagnose dispatched when CI failed or timed out
          - monitor state saved on autopilot-state

          If this issue persists, manual intervention is needed.
          Check: state/workspaces/ws-default/ci-logs-${COMPONENT}-*.txt on autopilot-state branch."

            gh issue create \
              --repo "$AUTOPILOT_REPO" \
              --title "$TITLE" \
              --body "$BODY" \
              2>/dev/null || echo "::warning ::Could not create failure notification issue"
            echo "::notice ::CI failure issue created for $COMPONENT"
          fi

      # ── 4. Save result to autopilot-state ────────────────────────────────────
      - name: "Save monitor result to state"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -e
          WS_ID="${{ steps.inputs.outputs.ws_id }}"
          COMPONENT="${{ steps.inputs.outputs.component }}"
          OVERALL="${{ steps.final.outputs.overall || 'unknown' }}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          RESULT=$(jq -n \
            --arg ws "$WS_ID" \
            --arg comp "$COMPONENT" \
            --arg sha "${{ steps.inputs.outputs.commit_sha }}" \
            --arg ver "${{ steps.inputs.outputs.version }}" \
            --arg source_repo "${{ steps.inputs.outputs.source_repo }}" \
            --arg source_branch "${{ steps.inputs.outputs.source_branch }}" \
            --arg ts "$NOW" \
            --arg overall "$OVERALL" \
            --arg run "${{ github.run_id }}" \
            --arg ci_workflow "${{ steps.inputs.outputs.ci_workflow_name }}" \
            --arg workflow_run_id "${{ steps.poll.outputs.success_run_id }}" \
            --arg workflow_run_url "${{ steps.poll.outputs.success_run_url }}" \
            --arg workflow_run_name "${{ steps.poll.outputs.success_run_name }}" \
            --arg artifact_verified "${{ steps.publish.outputs.verified || 'false' }}" \
            --arg artifact_evidence "${{ steps.publish.outputs.evidence || '' }}" \
            --arg failed_url "${{ steps.poll.outputs.failed_run_url || '' }}" \
            --arg monitor_strategy "${{ steps.poll.outputs.monitor_strategy || '' }}" \
            --arg active_signals "${{ steps.poll.outputs.active_signals || '' }}" \
            --arg check_runs_summary "${{ steps.poll.outputs.check_runs_summary || '' }}" \
            --arg source_head_sha "${{ steps.source_head.outputs.head_sha || '' }}" \
            --arg source_head_checked_at "${{ steps.source_head.outputs.checked_at || '' }}" \
            --arg source_head_matches "${{ steps.source_head.outputs.matches_released || 'false' }}" \
            --arg cap_repo "${{ steps.inputs.outputs.cap_repo || '' }}" \
            --arg cap_branch "${{ steps.inputs.outputs.cap_branch || '' }}" \
            --arg cap_values "${{ steps.inputs.outputs.cap_values || '' }}" \
            --arg cap_configured "${{ steps.cap_align.outputs.configured || 'false' }}" \
            --arg cap_aligned "${{ steps.cap_align.outputs.aligned || 'false' }}" \
            --arg cap_evidence "${{ steps.cap_align.outputs.evidence || '' }}" \
            '{
              workspaceId: $ws,
              component: $comp,
              commitSha: $sha,
              version: $ver,
              sourceRepo: $source_repo,
              sourceBranch: $source_branch,
              sourceHeadSha: $source_head_sha,
              sourceHeadCheckedAt: $source_head_checked_at,
              sourceHeadMatchesReleased: ($source_head_matches == "true"),
              monitoredAt: $ts,
              ciOutcome: $overall,
              monitorRunId: $run,
              ciWorkflowName: $ci_workflow,
              matchedWorkflowRunId: $workflow_run_id,
              matchedWorkflowRunUrl: $workflow_run_url,
              matchedWorkflowRunName: $workflow_run_name,
              monitorStrategy: $monitor_strategy,
              activeSignals: $active_signals,
              checkRunsSummary: $check_runs_summary,
              artifactVerified: ($artifact_verified == "true"),
              artifactEvidence: $artifact_evidence,
              failedRunUrl: $failed_url,
              capRepo: $cap_repo,
              capBranch: $cap_branch,
              capValuesPath: $cap_values,
              capConfigured: ($cap_configured == "true"),
              capAligned: ($cap_aligned == "true"),
              capAlignmentEvidence: $cap_evidence
            }')

          STATE_FILE="state/workspaces/${WS_ID}/ci-monitor-${COMPONENT}.json"
          EXISTING_SHA=$(gh api \
            "repos/$AUTOPILOT_REPO/contents/${STATE_FILE}?ref=$STATE_BRANCH" \
            --jq '.sha' 2>/dev/null || echo "")

          ARGS=(-f "branch=$STATE_BRANCH" \
            -f "message=ci-monitor: $COMPONENT $OVERALL [skip ci]" \
            -f "content=$(echo "$RESULT" | base64 -w0)")
          [ -n "$EXISTING_SHA" ] && [ "$EXISTING_SHA" != "null" ] && ARGS+=(-f "sha=$EXISTING_SHA")

          gh api "repos/$AUTOPILOT_REPO/contents/${STATE_FILE}" \
            --method PUT "${ARGS[@]}" > /dev/null 2>&1 || \
            echo "::warning ::Could not save monitor state — continuing."

          RELEASE_FILE="state/workspaces/${WS_ID}/${COMPONENT}-release-state.json"
          RELEASE_SHA=$(gh api \
            "repos/$AUTOPILOT_REPO/contents/${RELEASE_FILE}?ref=$STATE_BRANCH" \
            --jq '.sha' 2>/dev/null || echo "")
          RELEASE_CONTENT=$(gh api \
            "repos/$AUTOPILOT_REPO/contents/${RELEASE_FILE}?ref=$STATE_BRANCH" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')

          RELEASE_UPDATED=$(echo "$RELEASE_CONTENT" | jq \
            --arg source_repo "${{ steps.inputs.outputs.source_repo }}" \
            --arg source_branch "${{ steps.inputs.outputs.source_branch }}" \
            --arg source_head_sha "${{ steps.source_head.outputs.head_sha || '' }}" \
            --arg source_head_checked_at "${{ steps.source_head.outputs.checked_at || '' }}" \
            --arg source_head_matches "${{ steps.source_head.outputs.matches_released || 'false' }}" \
            --arg overall "$OVERALL" \
            --arg ver "${{ steps.inputs.outputs.version }}" \
            --arg cap_repo "${{ steps.inputs.outputs.cap_repo || '' }}" \
            --arg cap_branch "${{ steps.inputs.outputs.cap_branch || '' }}" \
            --arg cap_values "${{ steps.inputs.outputs.cap_values || '' }}" \
            --arg cap_configured "${{ steps.cap_align.outputs.configured || 'false' }}" \
            --arg cap_aligned "${{ steps.cap_align.outputs.aligned || 'false' }}" \
            --arg ts "$NOW" \
            '.sourceRepo = $source_repo
             | .sourceBranch = $source_branch
             | .sourceHeadSha = $source_head_sha
             | .sourceHeadCheckedAt = $source_head_checked_at
             | .sourceHeadMatchesReleased = ($source_head_matches == "true")
             | if ($overall == "success" and $cap_configured == "true" and $cap_aligned == "true") then
                 .promoted = true
                 | .status = "promoted"
                 | .ciResult = "success"
                 | .updatedAt = $ts
                 | .promotions = (
                     (.promotions // [])
                     | if any(.[]?; .target == "cap" and .repo == $cap_repo and .path == $cap_values and .tag == $ver and .status == "success") then .
                       else . + [{
                         target: "cap",
                         repo: $cap_repo,
                         branch: $cap_branch,
                         path: $cap_values,
                         tag: $ver,
                         sha: "",
                         timestamp: $ts,
                         status: "success"
                       }]
                       end
                   )
               else .
               end' 2>/dev/null || echo "$RELEASE_CONTENT")

          if [ -n "$RELEASE_SHA" ] && [ "$RELEASE_SHA" != "null" ]; then
            gh api "repos/$AUTOPILOT_REPO/contents/${RELEASE_FILE}" \
              --method PUT \
              -f "branch=$STATE_BRANCH" \
              -f "message=state: refresh ${COMPONENT} source-head [skip ci]" \
              -f "content=$(echo "$RELEASE_UPDATED" | base64 -w0)" \
              -f "sha=$RELEASE_SHA" > /dev/null 2>&1 || \
              echo "::warning ::Could not refresh release state with source head."
          fi

          echo "## CI Monitor Loop" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | $COMPONENT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.inputs.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ steps.inputs.outputs.commit_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Branch | \`${{ steps.inputs.outputs.source_branch }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source HEAD | \`${{ steps.source_head.outputs.head_sha || 'n/a' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HEAD Matches Released | ${{ steps.source_head.outputs.matches_released || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CI Outcome | **$OVERALL** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflow | \`${{ steps.inputs.outputs.ci_workflow_name || 'any' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Monitor Strategy | \`${{ steps.poll.outputs.monitor_strategy || 'unknown' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Active Signals | ${{ steps.poll.outputs.active_signals || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Repo | \`${{ steps.inputs.outputs.source_repo }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact Verified | ${{ steps.publish.outputs.verified || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact Evidence | ${{ steps.publish.outputs.evidence || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CAP Aligned | ${{ steps.cap_align.outputs.aligned || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CAP Evidence | ${{ steps.cap_align.outputs.evidence || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          MATCHED_RUN_URL="${{ steps.poll.outputs.success_run_url || steps.poll.outputs.failed_run_url }}"
          if [ -n "$MATCHED_RUN_URL" ]; then
            echo "| Matched Run | [$MATCHED_RUN_URL]($MATCHED_RUN_URL) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Matched Run | n/a |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$OVERALL" = "failure" ] && [ -n "${{ steps.poll.outputs.failed_run_url }}" ]; then
            echo "| Failed Run | [${{ steps.poll.outputs.failed_run_url }}](${{ steps.poll.outputs.failed_run_url }}) |" >> "$GITHUB_STEP_SUMMARY"
          fi
