name: "[Core] Post-Merge Monitor"
run-name: "${{ github.workflow }} • PR #${{ github.event.pull_request.number }} • ${{ github.event.pull_request.head.ref }}"

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read
  issues: write

concurrency:
  group: post-merge-monitor-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state
  BACKUP_BRANCH: autopilot-backups

jobs:
  # ─── Skip if not actually merged ─────────────────────────────────────────
  check-merged:
    name: "Verify merge"
    runs-on: ubuntu-latest
    outputs:
      merged: ${{ steps.check.outputs.merged }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      branch: ${{ steps.check.outputs.branch }}
      sha: ${{ steps.check.outputs.sha }}
    steps:
      - name: Check if PR was merged
        id: check
        run: |
          MERGED="${{ github.event.pull_request.merged }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          SHA="${{ github.event.pull_request.merge_commit_sha }}"
          echo "merged=$MERGED"     >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"     >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"           >> "$GITHUB_OUTPUT"
          if [ "$MERGED" != "true" ]; then
            echo "::notice::PR #$PR_NUMBER was closed without merging; skipping post-merge monitor."
          fi

  # ─── Health check ─────────────────────────────────────────────────────────
  health-check:
    name: "Health check"
    needs: check-merged
    if: needs.check-merged.outputs.merged == 'true'
    runs-on: ubuntu-latest
    outputs:
      health_status: ${{ steps.health.outputs.status }}
      health_details: ${{ steps.health.outputs.details }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            ops/scripts
            scripts
          sparse-checkout-cone-mode: false

      - name: Run health probe
        id: health
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e  # no pipefail — API fallback patterns need pipe flexibility
          STATUS="healthy"
          DETAILS=""

          # ── Probe 1: Verify autopilot-state branch is accessible ─────────
          if gh api "repos/$REPO/branches/$STATE_BRANCH" > /dev/null 2>&1; then
            DETAILS="${DETAILS}state-branch:ok "
          else
            STATUS="degraded"
            DETAILS="${DETAILS}state-branch:FAIL "
          fi

          # ── Probe 2: Verify main branch exists ───────────────────────────
          if gh api "repos/$REPO/branches/main" > /dev/null 2>&1; then
            DETAILS="${DETAILS}main-branch:ok "
          else
            STATUS="degraded"
            DETAILS="${DETAILS}main-branch:FAIL "
          fi

          # ── Probe 3: Check recent workflow run status (last 5) ────────────
          RECENT_FAILURES=$(gh api \
            "repos/$REPO/actions/runs?per_page=5&branch=main&status=failure" \
            --jq '.workflow_runs | length' 2>/dev/null || echo "0")
          if [ "$RECENT_FAILURES" -gt 3 ]; then
            STATUS="degraded"
            DETAILS="${DETAILS}recent-failures:HIGH($RECENT_FAILURES) "
          else
            DETAILS="${DETAILS}recent-failures:ok($RECENT_FAILURES) "
          fi

          echo "status=$STATUS"   >> "$GITHUB_OUTPUT"
          echo "details=$DETAILS" >> "$GITHUB_OUTPUT"
          echo "::notice::Health check result: status=$STATUS details=$DETAILS"

  # ─── Write audit trail + backup signal ───────────────────────────────────
  audit-and-backup:
    name: "Audit trail & backup signal"
    needs: [check-merged, health-check]
    if: needs.check-merged.outputs.merged == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Write audit trail to autopilot-state
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e  # no pipefail — API fallback patterns need pipe flexibility
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFE_NOW=$(date -u +%Y%m%d-%H%M%S)
          PR_NUMBER="${{ needs.check-merged.outputs.pr_number }}"
          BRANCH="${{ needs.check-merged.outputs.branch }}"
          SHA="${{ needs.check-merged.outputs.sha }}"
          HEALTH="${{ needs.health-check.outputs.health_status }}"
          DETAILS="${{ needs.health-check.outputs.health_details }}"

          AUDIT=$(jq -n \
            --arg id    "post-merge-pr${PR_NUMBER}-${SAFE_NOW}" \
            --arg pr    "$PR_NUMBER" \
            --arg br    "$BRANCH" \
            --arg sha   "$SHA" \
            --arg ts    "$NOW" \
            --arg run   "${{ github.run_id }}" \
            --arg hs    "$HEALTH" \
            --arg hd    "$DETAILS" \
            '{id: $id, event: "post-merge-monitor", prNumber: ($pr|tonumber),
              branch: $br, mergeSha: $sha, timestamp: $ts, runId: $run,
              healthCheck: {status: $hs, details: $hd}}')

          AUDIT_PATH="state/audit/post-merge-pr${PR_NUMBER}-${SAFE_NOW}.json"
          gh api "repos/$REPO/contents/${AUDIT_PATH}" \
            --method PUT \
            -f "branch=$STATE_BRANCH" \
            -f "message=audit: post-merge monitor PR #$PR_NUMBER [skip ci]" \
            -f "content=$(echo "$AUDIT" | base64 -w0)" > /dev/null
          echo "::notice::Audit written to $AUDIT_PATH on $STATE_BRANCH"

      - name: Write backup snapshot signal to autopilot-backups
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e  # no pipefail — API fallback patterns need pipe flexibility
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFE_NOW=$(date -u +%Y%m%d-%H%M%S)
          PR_NUMBER="${{ needs.check-merged.outputs.pr_number }}"
          BRANCH="${{ needs.check-merged.outputs.branch }}"
          HEALTH="${{ needs.health-check.outputs.health_status }}"

          SIGNAL=$(jq -n \
            --arg pr  "$PR_NUMBER" \
            --arg br  "$BRANCH" \
            --arg ts  "$NOW" \
            --arg run "${{ github.run_id }}" \
            --arg hs  "$HEALTH" \
            '{type: "post-merge-signal", prNumber: ($pr|tonumber), branch: $br,
              timestamp: $ts, runId: $run, healthStatus: $hs}')

          SIGNAL_PATH="signals/post-merge-pr${PR_NUMBER}-${SAFE_NOW}.json"
          gh api "repos/$REPO/contents/${SIGNAL_PATH}" \
            --method PUT \
            -f "branch=$BACKUP_BRANCH" \
            -f "message=signal: post-merge PR #$PR_NUMBER [skip ci]" \
            -f "content=$(echo "$SIGNAL" | base64 -w0)" > /dev/null
          echo "::notice::Backup signal written to $SIGNAL_PATH on $BACKUP_BRANCH"

      - name: Emit rollback signal on regression
        if: needs.health-check.outputs.health_status == 'degraded'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e  # no pipefail — API fallback patterns need pipe flexibility
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFE_NOW=$(date -u +%Y%m%d-%H%M%S)
          PR_NUMBER="${{ needs.check-merged.outputs.pr_number }}"
          BRANCH="${{ needs.check-merged.outputs.branch }}"
          SHA="${{ needs.check-merged.outputs.sha }}"
          DETAILS="${{ needs.health-check.outputs.health_details }}"

          ROLLBACK=$(jq -n \
            --arg pr     "$PR_NUMBER" \
            --arg br     "$BRANCH" \
            --arg sha    "$SHA" \
            --arg ts     "$NOW" \
            --arg run    "${{ github.run_id }}" \
            --arg detail "$DETAILS" \
            '{type: "rollback-signal", prNumber: ($pr|tonumber), branch: $br,
              mergeSha: $sha, timestamp: $ts, runId: $run,
              reason: "post-merge health check degraded",
              details: $detail, status: "pending-review",
              note: "Manual review required before executing rollback"}')

          ROLLBACK_PATH="state/audit/rollback-signal-pr${PR_NUMBER}-${SAFE_NOW}.json"
          gh api "repos/$REPO/contents/${ROLLBACK_PATH}" \
            --method PUT \
            -f "branch=$STATE_BRANCH" \
            -f "message=rollback-signal: degraded after PR #$PR_NUMBER [skip ci]" \
            -f "content=$(echo "$ROLLBACK" | base64 -w0)" > /dev/null
          echo "::warning::Rollback signal emitted for PR #$PR_NUMBER (health: degraded)"

      - name: "Escalate to @claude on regression"
        if: needs.health-check.outputs.health_status == 'degraded'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.check-merged.outputs.pr_number }}"
          BRANCH="${{ needs.check-merged.outputs.branch }}"
          DETAILS="${{ needs.health-check.outputs.health_details }}"

          gh api "repos/$REPO/issues" --method POST \
            -f "title=⚠️ Post-merge regression PR #$PR_NUMBER — @claude investigate" \
            -f "body=## Post-Merge Regression Detected

          **PR**: #$PR_NUMBER
          **Branch**: \`$BRANCH\`
          **Health**: degraded
          **Details**: $DETAILS

          A rollback signal has been emitted. Manual review required.

          ### Action Required
          @claude Please:
          1. Check health details and identify which checks are failing
          2. Determine if the merged PR caused the regression
          3. If yes, create a fix or revert the change
          4. Verify health returns to \`healthy\` after fix

          **Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            -f "labels=[\"needs-claude\",\"regression\",\"auto-generated\"]" 2>/dev/null || echo "::warning ::Failed to create escalation issue"

      - name: Write step summary
        if: always()
        run: |
          PR_NUMBER="${{ needs.check-merged.outputs.pr_number }}"
          BRANCH="${{ needs.check-merged.outputs.branch }}"
          HEALTH="${{ needs.health-check.outputs.health_status || 'unknown' }}"
          DETAILS="${{ needs.health-check.outputs.health_details || '' }}"
          {
            echo "## 📊 Post-Merge Monitor"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| PR | #$PR_NUMBER |"
            echo "| Branch | \`$BRANCH\` |"
            echo "| Health | $HEALTH |"
            echo "| Details | $DETAILS |"
            echo ""
            if [ "$HEALTH" = "degraded" ]; then
              echo "> ⚠️ **Regression detected** — rollback signal emitted. Manual review required."
            else
              echo "> ✅ Post-merge health check passed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Auto-update session memory + detect undocumented artifacts ──────────
  auto-update-docs:
    name: "Auto-update memory & docs"
    needs: [check-merged, health-check]
    if: needs.check-merged.outputs.merged == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 2

      - name: "1. Register PR in session memory"
        id: memory
        run: |
          set -e
          PR_NUMBER="${{ needs.check-merged.outputs.pr_number }}"
          BRANCH="${{ needs.check-merged.outputs.branch }}"
          SHA="${{ needs.check-merged.outputs.sha }}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          HEALTH="${{ needs.health-check.outputs.health_status }}"

          # Get PR title from the merge commit message (first line)
          PR_TITLE=$(git log -1 --format="%s" "$SHA" 2>/dev/null || echo "PR #$PR_NUMBER")

          # Get changed files in this merge
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          NEW_WORKFLOWS=$(echo "$CHANGED_FILES" | grep -c '\.github/workflows/.*\.yml$' || echo "0")
          NEW_CONTRACTS=$(echo "$CHANGED_FILES" | grep -c 'contracts/.*\.json$' || echo "0")
          NEW_TRIGGERS=$(echo "$CHANGED_FILES" | grep -c 'trigger/.*\.json$' || echo "0")
          NEW_SCHEMAS=$(echo "$CHANGED_FILES" | grep -c 'schemas/.*\.json$' || echo "0")

          # Update session memory: add PR to latest session or create entry
          if [ -f contracts/claude-session-memory.json ]; then
            jq --arg ts "$NOW" \
               --arg pr "#$PR_NUMBER" \
               --arg title "$PR_TITLE" \
               --arg health "$HEALTH" \
               '.lastUpdated = $ts |
                .currentState.lastMergedPR = $pr |
                .currentState.lastMergedTitle = $title |
                .currentState.lastMergedHealth = $health' \
               contracts/claude-session-memory.json > /tmp/mem-updated.json && \
               mv /tmp/mem-updated.json contracts/claude-session-memory.json
            echo "::notice ::Session memory updated with PR #$PR_NUMBER"
          fi

          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "new_workflows=$NEW_WORKFLOWS" >> "$GITHUB_OUTPUT"
          echo "new_contracts=$NEW_CONTRACTS" >> "$GITHUB_OUTPUT"
          echo "new_triggers=$NEW_TRIGGERS" >> "$GITHUB_OUTPUT"
          echo "new_schemas=$NEW_SCHEMAS" >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"

      - name: "2. Detect undocumented artifacts in CLAUDE.md"
        id: scan
        run: |
          set -e
          MISSING_ITEMS=""
          MISSING_COUNT=0

          # Scan workflows not in CLAUDE.md
          for wf in .github/workflows/*.yml; do
            WF_NAME=$(basename "$wf")
            if ! grep -qF "$WF_NAME" CLAUDE.md 2>/dev/null; then
              # Get workflow display name
              WF_DISPLAY=$(grep -m1 '^name:' "$wf" | sed 's/^name:\s*//' | tr -d '"' || echo "$WF_NAME")
              MISSING_ITEMS="${MISSING_ITEMS}\n- Workflow: \`$WF_NAME\` ($WF_DISPLAY)"
              MISSING_COUNT=$((MISSING_COUNT + 1))
            fi
          done

          # Scan trigger files not in CLAUDE.md
          for tf in trigger/*.json; do
            [ -f "$tf" ] || continue
            TF_NAME=$(basename "$tf")
            if ! grep -qF "$TF_NAME" CLAUDE.md 2>/dev/null; then
              MISSING_ITEMS="${MISSING_ITEMS}\n- Trigger: \`$TF_NAME\`"
              MISSING_COUNT=$((MISSING_COUNT + 1))
            fi
          done

          # Scan contracts not in CLAUDE.md
          for cf in contracts/*.json; do
            [ -f "$cf" ] || continue
            CF_NAME=$(basename "$cf")
            if ! grep -qF "$CF_NAME" CLAUDE.md 2>/dev/null; then
              MISSING_ITEMS="${MISSING_ITEMS}\n- Contract: \`$CF_NAME\`"
              MISSING_COUNT=$((MISSING_COUNT + 1))
            fi
          done

          # Scan schemas not in CLAUDE.md
          for sf in schemas/*.json; do
            [ -f "$sf" ] || continue
            SF_NAME=$(basename "$sf")
            if ! grep -qF "$SF_NAME" CLAUDE.md 2>/dev/null; then
              MISSING_ITEMS="${MISSING_ITEMS}\n- Schema: \`$SF_NAME\`"
              MISSING_COUNT=$((MISSING_COUNT + 1))
            fi
          done

          echo "missing_count=$MISSING_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$MISSING_COUNT" -gt 0 ]; then
            echo "missing_items<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$MISSING_ITEMS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "::warning ::Found $MISSING_COUNT undocumented artifacts in CLAUDE.md"
          else
            echo "::notice ::All artifacts are documented in CLAUDE.md"
          fi

      - name: "3. Commit memory update"
        run: |
          set -e
          git config user.name "autopilot-bot"
          git config user.email "autopilot@users.noreply.github.com"

          git add contracts/claude-session-memory.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "::notice ::No memory changes to commit"
          else
            PR_NUMBER="${{ needs.check-merged.outputs.pr_number }}"
            git commit -m "chore(auto): update session memory after PR #$PR_NUMBER [skip ci]"
            git push origin main 2>/dev/null || echo "::warning ::Could not push memory update (non-fatal)"
            echo "::notice ::Session memory auto-committed"
          fi

      - name: "4. Create @claude issue if undocumented artifacts found"
        if: steps.scan.outputs.missing_count != '0'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          MISSING_COUNT="${{ steps.scan.outputs.missing_count }}"
          MISSING_ITEMS="${{ steps.scan.outputs.missing_items }}"
          PR_NUMBER="${{ needs.check-merged.outputs.pr_number }}"

          # Only create issue if significant (>3 missing items) to avoid noise
          if [ "$MISSING_COUNT" -le 3 ]; then
            echo "::notice ::Only $MISSING_COUNT undocumented items — below threshold, logging only"
            exit 0
          fi

          EXISTING=$(gh api "repos/$REPO/issues?labels=needs-claude,docs-update&state=open&per_page=3" \
            --jq 'length' 2>/dev/null || echo "0")
          if [ "$EXISTING" -gt 0 ]; then
            echo "::notice ::Existing docs-update issue — skipping"
            exit 0
          fi

          gh api "repos/$REPO/issues" --method POST \
            -f "title=📝 $MISSING_COUNT undocumented artifacts found after PR #$PR_NUMBER — @claude" \
            -f "body=## Auto-Documentation Request

          After merging PR #$PR_NUMBER, the post-merge monitor detected **$MISSING_COUNT artifacts** not documented in \`CLAUDE.md\`.

          ### Missing Items
          $MISSING_ITEMS

          ### Required Actions
          @claude Update \`CLAUDE.md\` to include all missing artifacts:
          - Add missing workflows to the Workflows table
          - Add missing triggers to the Trigger Files table
          - Add missing contracts to the Key Files section
          - Add missing schemas to the Schemas table

          _Auto-generated by post-merge-monitor auto-update-docs._" \
            -f "labels=[\"needs-claude\",\"docs-update\",\"auto-generated\"]" 2>/dev/null || true

      - name: "5. Step summary"
        if: always()
        run: |
          {
            echo "## Auto-Update Docs Report"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| PR | #${{ needs.check-merged.outputs.pr_number }} |"
            echo "| Memory updated | Yes |"
            echo "| New workflows in PR | ${{ steps.memory.outputs.new_workflows }} |"
            echo "| New contracts in PR | ${{ steps.memory.outputs.new_contracts }} |"
            echo "| Undocumented items | ${{ steps.scan.outputs.missing_count }} |"
          } >> "$GITHUB_STEP_SUMMARY"
