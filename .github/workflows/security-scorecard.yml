name: "Security Scorecard"

# OpenSSF Scorecard — 18 automated security checks on the repo itself
# Checks: branch protection, pinned actions, token permissions, SAST, etc.
# Results visible in GitHub Security tab (SARIF upload)
# https://github.com/ossf/scorecard-action

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  security-events: write
  id-token: write
  contents: read
  actions: read

concurrency:
  group: security-scorecard
  cancel-in-progress: true

jobs:
  scorecard:
    name: "OpenSSF Scorecard"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Run Scorecard"
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: "Upload SARIF to Security tab"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
