name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-product-repo:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate export config and repository hygiene
        shell: pwsh
        run: |
          ./scripts/validate-product-export.ps1 -RepoRoot .
