# ===========================================================
# Autonomous Agent Improvement Engine
#
# Each agent analyzes their domain independently (parallel),
# findings are consolidated, and safe fixes are applied.
#
# Flow: OBSERVE → THINK → PLAN → ACT → VALIDATE → LEARN
#
# Auto-fix threshold: risk < 8
# Escalation: risk >= 8 or critical security finding
# ===========================================================
name: "[Agent] Autonomous Improve"

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Weekdays 07:00 UTC
    - cron: '0 12 * * 3'    # Wednesday 12:00 UTC (deep cycle)
  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agent to run'
        required: false
        default: 'all'
        type: choice
        options: [all, devops, security, quality, dashboard]
      mode:
        description: 'Operation mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto       # Analyze + fix + PR
          - analyze    # Report only

concurrency:
  group: agent-autonomous-improve
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ━━━ OBSERVE: Each agent scans their domain (parallel) ━━━
  observe:
    name: "OBSERVE"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.state.outputs.version }}
      workflow_count: ${{ steps.state.outputs.workflow_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gather state
        id: state
        run: |
          echo "version=$(jq -r '.version // "0.0.0"' version.json)" >> "$GITHUB_OUTPUT"
          echo "workflow_count=$(ls .github/workflows/*.yml 2>/dev/null | wc -l)" >> "$GITHUB_OUTPUT"

  think-devops:
    name: "THINK: DevOps"
    needs: observe
    if: inputs.agent == 'all' || inputs.agent == 'devops' || inputs.agent == ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      fix_count: ${{ steps.analyze.outputs.fix_count }}
      findings: ${{ steps.analyze.outputs.findings }}
    steps:
      - uses: actions/checkout@v4
      - name: DevOps analysis
        id: analyze
        run: |
          set -euo pipefail
          FIXES=0
          FINDINGS=""

          # 1. Deprecated actions (real uses: lines only, not sed patterns)
          for f in .github/workflows/*.yml; do
            COUNT=$(grep -cP '^\s+uses:\s+actions/\S+@v3' "$f" 2>/dev/null || true)
            if [ "${COUNT:-0}" -gt 0 ]; then
              FIXES=$((FIXES + COUNT))
              FINDINGS="${FINDINGS}DEPRECATED|$(basename $f)|$COUNT\n"
            fi
          done

          # 2. Missing timeout-minutes on jobs
          for f in .github/workflows/*.yml; do
            HAS_JOBS=$(grep -c "runs-on:" "$f" 2>/dev/null || true)
            HAS_TIMEOUT=$(grep -c "timeout-minutes:" "$f" 2>/dev/null || true)
            if [ "${HAS_JOBS:-0}" -gt 0 ] && [ "${HAS_TIMEOUT:-0}" -eq 0 ]; then
              FINDINGS="${FINDINGS}NO_TIMEOUT|$(basename $f)\n"
            fi
          done

          # 3. Deprecated ::set-output
          for f in .github/workflows/*.yml; do
            if grep -qP '::set-output\s+name=' "$f" 2>/dev/null; then
              FIXES=$((FIXES + 1))
              FINDINGS="${FINDINGS}SET_OUTPUT|$(basename $f)\n"
            fi
          done

          echo "fix_count=$FIXES" >> "$GITHUB_OUTPUT"
          echo "findings<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  think-security:
    name: "THINK: Security"
    needs: observe
    if: inputs.agent == 'all' || inputs.agent == 'security' || inputs.agent == ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      critical_count: ${{ steps.analyze.outputs.critical_count }}
      findings: ${{ steps.analyze.outputs.findings }}
    steps:
      - uses: actions/checkout@v4
      - name: Security analysis
        id: analyze
        run: |
          set -euo pipefail
          CRITICAL=0
          FINDINGS=""

          # 1. Hardcoded secrets (real tokens, not pattern references)
          TOKENS=$(grep -rlE "ghp_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16}" \
            --include="*.yml" --include="*.json" --include="*.sh" \
            --exclude-dir=.git . 2>/dev/null | wc -l)
          if [ "$TOKENS" -gt 0 ]; then
            CRITICAL=$((CRITICAL + TOKENS))
            FINDINGS="${FINDINGS}CRITICAL|hardcoded-token|$TOKENS files\n"
          fi

          # 2. Injection risk: pull_request_target + checkout
          for f in .github/workflows/*.yml; do
            if grep -q "pull_request_target" "$f" 2>/dev/null && grep -q "actions/checkout" "$f" 2>/dev/null; then
              CRITICAL=$((CRITICAL + 1))
              FINDINGS="${FINDINGS}CRITICAL|injection-risk|$(basename $f)\n"
            fi
          done

          # 3. Corporate FQDNs in public files (not doc patterns)
          for f in .claude/agents/*.md .claude/skills/*.md panel/*.html; do
            if [ -f "$f" ] && grep -qE '[a-z0-9]+\.intranet\.[a-z]+\.[a-z]+\.[a-z]+' "$f" 2>/dev/null; then
              CRITICAL=$((CRITICAL + 1))
              FINDINGS="${FINDINGS}HIGH|corp-fqdn-leak|$f\n"
            fi
          done

          echo "critical_count=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "findings<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  think-quality:
    name: "THINK: Quality"
    needs: observe
    if: inputs.agent == 'all' || inputs.agent == 'quality' || inputs.agent == ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      error_count: ${{ steps.analyze.outputs.error_count }}
      findings: ${{ steps.analyze.outputs.findings }}
    steps:
      - uses: actions/checkout@v4
      - name: Quality analysis
        id: analyze
        run: |
          set -euo pipefail
          ERRORS=0
          FINDINGS=""

          # 1. JSON validity
          for f in schemas/*.json contracts/*.json version.json; do
            if [ -f "$f" ] && ! jq '.' "$f" > /dev/null 2>&1; then
              ERRORS=$((ERRORS + 1))
              FINDINGS="${FINDINGS}ERROR|invalid-json|$f\n"
            fi
          done

          # 2. YAML validity
          for f in .github/workflows/*.yml; do
            if ! python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
              ERRORS=$((ERRORS + 1))
              FINDINGS="${FINDINGS}ERROR|invalid-yaml|$f\n"
            fi
          done

          # 3. Version/CHANGELOG consistency
          VER=$(jq -r '.version' version.json 2>/dev/null || echo "")
          if [ -n "$VER" ] && ! grep -q "\[$VER\]" CHANGELOG.md 2>/dev/null; then
            ERRORS=$((ERRORS + 1))
            FINDINGS="${FINDINGS}ERROR|changelog-mismatch|$VER\n"
          fi

          # 4. Version format (never X.Y.10+)
          PATCH=$(echo "$VER" | cut -d. -f3)
          if [ "${PATCH:-0}" -gt 9 ] 2>/dev/null; then
            ERRORS=$((ERRORS + 1))
            FINDINGS="${FINDINGS}CRITICAL|version-overflow|$VER patch=$PATCH\n"
          fi

          # 5. Dead trigger references
          for f in trigger/*.json; do
            [ -f "$f" ] || continue
            jq -r '.changes[]?.content_ref // empty' "$f" 2>/dev/null | while read ref; do
              [ -n "$ref" ] && [ ! -f "$ref" ] && echo "DEAD_REF|$f|$ref"
            done | while read line; do
              FINDINGS="${FINDINGS}WARNING|$line\n"
            done
          done

          echo "error_count=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "findings<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  think-dashboard:
    name: "THINK: Dashboard"
    needs: observe
    if: inputs.agent == 'all' || inputs.agent == 'dashboard' || inputs.agent == ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      findings: ${{ steps.analyze.outputs.findings }}
    steps:
      - uses: actions/checkout@v4
      - name: Dashboard analysis
        id: analyze
        run: |
          FINDINGS=""

          if [ -f "panel/dashboard/state.json" ]; then
            if ! jq '.' panel/dashboard/state.json > /dev/null 2>&1; then
              FINDINGS="${FINDINGS}ERROR|broken-state-json\n"
            fi
          fi

          if [ -f "panel/index.html" ]; then
            OPEN=$(grep -c "<div" panel/index.html 2>/dev/null || echo 0)
            CLOSE=$(grep -c "</div>" panel/index.html 2>/dev/null || echo 0)
            if [ "$OPEN" != "$CLOSE" ]; then
              FINDINGS="${FINDINGS}WARNING|div-mismatch|$OPEN open vs $CLOSE close\n"
            fi
          fi

          echo "findings<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  # ━━━ PLAN: Consolidate and decide ━━━
  plan:
    name: "PLAN"
    needs: [observe, think-devops, think-security, think-quality, think-dashboard]
    if: always() && needs.observe.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      action: ${{ steps.decide.outputs.action }}
      risk_score: ${{ steps.decide.outputs.risk_score }}
    steps:
      - name: Decide
        id: decide
        run: |
          DEVOPS="${{ needs.think-devops.outputs.fix_count || '0' }}"
          SECURITY="${{ needs.think-security.outputs.critical_count || '0' }}"
          QUALITY="${{ needs.think-quality.outputs.error_count || '0' }}"
          MODE="${{ inputs.mode || 'auto' }}"

          RISK=0
          [ "$SECURITY" -gt 0 ] && RISK=$((RISK + 5))
          [ "$QUALITY" -gt 2 ] && RISK=$((RISK + 3))

          TOTAL=$((DEVOPS + SECURITY + QUALITY))

          if [ "$MODE" = "analyze" ]; then ACTION="report"
          elif [ "$TOTAL" -eq 0 ]; then ACTION="none"
          elif [ "$RISK" -ge 8 ]; then ACTION="escalate"
          elif [ "$SECURITY" -gt 0 ]; then ACTION="escalate"
          else ACTION="autofix"
          fi

          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "risk_score=$RISK" >> "$GITHUB_OUTPUT"

  # ━━━ ACT: Apply safe fixes ━━━
  act:
    name: "ACT: Auto-Fix"
    needs: [observe, plan, think-devops]
    if: needs.plan.outputs.action == 'autofix'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply fixes, validate, commit, PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="claude/agent-improve-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git config user.name "autopilot[bot]"
          git config user.email "autopilot[bot]@users.noreply.github.com"

          # Apply deprecated action upgrades
          for f in .github/workflows/*.yml; do
            sed -i -E 's|(^\s+uses:\s+actions/checkout)@v3|\1@v4|g' "$f"
            sed -i -E 's|(^\s+uses:\s+actions/setup-node)@v3|\1@v4|g' "$f"
            sed -i -E 's|(^\s+uses:\s+actions/cache)@v3|\1@v4|g' "$f"
            sed -i -E 's|(^\s+uses:\s+actions/upload-artifact)@v3|\1@v4|g' "$f"
            sed -i -E 's|(^\s+uses:\s+actions/download-artifact)@v3|\1@v4|g' "$f"
          done

          # Validate
          ERRORS=0
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null || { echo "BROKE: $f"; ERRORS=$((ERRORS+1)); }
          done
          if [ "$ERRORS" -gt 0 ]; then
            git checkout -- .
            echo "::error ::Validation failed, rolled back"
            exit 1
          fi

          # Check if anything changed
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi

          # Version bump + changelog
          bash scripts/version-bump.sh patch
          NEW_VER=$(jq -r '.version' version.json)

          TEMP=$(mktemp)
          { head -6 CHANGELOG.md; echo ""; echo "## [$NEW_VER] - $(date +%Y-%m-%d)"; echo ""; echo "### Fixed";
            echo "- Autonomous agent improvements (devops fixes)";
            echo "- Applied by: agent-autonomous-improve"; tail -n +7 CHANGELOG.md; } > "$TEMP"
          mv "$TEMP" CHANGELOG.md

          git add -A
          git commit -m "fix: autonomous improvements v$NEW_VER [agent-autonomous-improve]"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "fix: Autonomous improvements v$NEW_VER" \
            --body "Automated by agent-autonomous-improve. Risk: ${{ needs.plan.outputs.risk_score }}/10" \
            --base main --head "$BRANCH"

  # ━━━ ESCALATE: High risk ━━━
  escalate:
    name: "ACT: Escalate"
    needs: [plan, think-security, think-quality]
    if: needs.plan.outputs.action == 'escalate'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[Agent] High-risk findings (risk ${{ needs.plan.outputs.risk_score }}/10)" \
            --label "agent-team,needs-review,priority-high" \
            --body "## Escalation

          **Risk**: ${{ needs.plan.outputs.risk_score }}/10
          **Security**: ${{ needs.think-security.outputs.critical_count || '0' }} critical
          **Quality**: ${{ needs.think-quality.outputs.error_count || '0' }} errors

          ### Security Findings
          ${{ needs.think-security.outputs.findings || 'None' }}

          ### Quality Findings
          ${{ needs.think-quality.outputs.findings || 'None' }}

          *Escalated by agent-autonomous-improve*"

  # ━━━ LEARN: Record outcomes ━━━
  learn:
    name: "LEARN"
    needs: [observe, plan, act, escalate]
    if: always() && needs.observe.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record
        run: |
          echo "## Cycle Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ needs.observe.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Action | ${{ needs.plan.outputs.action || 'none' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Risk | ${{ needs.plan.outputs.risk_score || '0' }}/10 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | #${{ github.run_number }} |" >> "$GITHUB_STEP_SUMMARY"
