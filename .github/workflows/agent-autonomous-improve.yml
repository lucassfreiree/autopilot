# ===========================================================
# Autonomous Agent Improvement Engine
#
# The "brain" that makes agents work FOR the owner.
# Each agent specializes in a domain, analyzes independently,
# and collaborates to deliver improvements.
#
# Flow: OBSERVE → THINK → PLAN → IMPLEMENT → VALIDATE → SHIP
#
# No human intervention needed unless:
#   - Breaking change detected
#   - Risk score > 7/10
#   - Cross-domain conflict between agents
# ===========================================================
name: "[Agent] Autonomous Improve"

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Weekdays 07:00 UTC - Main improvement cycle
    - cron: '0 12 * * 3'    # Wednesday 12:00 UTC - Deep analysis cycle
  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agent to run (all = full team)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - architect
          - devops
          - quality
          - dashboard
          - security
      mode:
        description: 'Operation mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto       # Analyze + implement + merge safe fixes
          - analyze    # Analyze only, create issue with findings
          - implement  # Implement based on existing issue

concurrency:
  group: agent-autonomous-improve
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  IMPROVEMENT_BRANCH_PREFIX: "claude/agent-improve"

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # OBSERVE: Gather current state and metrics
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  observe:
    name: "OBSERVE: Gather State"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.state.outputs.version }}
      workflow_count: ${{ steps.state.outputs.workflow_count }}
      agent_count: ${{ steps.state.outputs.agent_count }}
      schema_count: ${{ steps.state.outputs.schema_count }}
      last_release: ${{ steps.state.outputs.last_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather product state
        id: state
        run: |
          echo "version=$(jq -r '.version // "0.0.0"' version.json)" >> "$GITHUB_OUTPUT"
          echo "workflow_count=$(ls .github/workflows/*.yml 2>/dev/null | wc -l)" >> "$GITHUB_OUTPUT"
          echo "agent_count=$(ls .claude/agents/*.md 2>/dev/null | wc -l)" >> "$GITHUB_OUTPUT"
          echo "schema_count=$(ls schemas/*.json 2>/dev/null | wc -l)" >> "$GITHUB_OUTPUT"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "last_release=$LAST_TAG" >> "$GITHUB_OUTPUT"

          echo "## Product State" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | $(jq -r '.version' version.json) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflows | $(ls .github/workflows/*.yml | wc -l) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agents | $(ls .claude/agents/*.md | wc -l) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Schemas | $(ls schemas/*.json | wc -l) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Last Tag | $LAST_TAG |" >> "$GITHUB_STEP_SUMMARY"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # THINK: Each agent analyzes their domain
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  think-devops:
    name: "THINK: DevOps Agent"
    needs: observe
    if: inputs.agent == 'all' || inputs.agent == 'devops' || inputs.agent == ''
    runs-on: ubuntu-latest
    outputs:
      findings: ${{ steps.analyze.outputs.findings }}
      fix_count: ${{ steps.analyze.outputs.fix_count }}
    steps:
      - uses: actions/checkout@v4

      - name: DevOps analysis
        id: analyze
        run: |
          FINDINGS=""
          FIXES=0

          # 1. Deprecated GitHub Actions
          for f in .github/workflows/*.yml; do
            DEPS=$(grep -cE "actions/(checkout|setup-node|cache|upload-artifact|download-artifact)@v3" "$f" 2>/dev/null || echo 0)
            if [ "$DEPS" -gt 0 ]; then
              FINDINGS="${FINDINGS}DEPRECATED|$(basename $f)|$DEPS deprecated action refs\n"
              FIXES=$((FIXES + 1))
            fi
          done

          # 2. Missing timeout-minutes
          for f in .github/workflows/*.yml; do
            if grep -q "runs-on:" "$f" && ! grep -q "timeout-minutes:" "$f"; then
              FINDINGS="${FINDINGS}TIMEOUT|$(basename $f)|Missing timeout-minutes\n"
              FIXES=$((FIXES + 1))
            fi
          done

          # 3. Workflows without error handling
          for f in .github/workflows/*.yml; do
            if grep -q "run: |" "$f" && ! grep -q "set -e" "$f" 2>/dev/null; then
              # Check if multi-line scripts lack error handling
              HAS_MULTILINE=$(grep -c "run: |" "$f" 2>/dev/null || echo 0)
              HAS_SETE=$(grep -c "set -e\|set -o pipefail" "$f" 2>/dev/null || echo 0)
              if [ "$HAS_MULTILINE" -gt "$HAS_SETE" ]; then
                FINDINGS="${FINDINGS}ERROR_HANDLING|$(basename $f)|Scripts without set -e\n"
              fi
            fi
          done

          echo -e "$FINDINGS" > /tmp/devops-findings.txt
          echo "findings<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "fix_count=$FIXES" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: devops-findings
          path: /tmp/devops-findings.txt

  think-security:
    name: "THINK: Security Agent"
    needs: observe
    if: inputs.agent == 'all' || inputs.agent == 'security' || inputs.agent == ''
    runs-on: ubuntu-latest
    outputs:
      findings: ${{ steps.analyze.outputs.findings }}
      critical_count: ${{ steps.analyze.outputs.critical_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Security analysis
        id: analyze
        run: |
          FINDINGS=""
          CRITICAL=0

          # 1. Secrets in echo/print statements
          for f in .github/workflows/*.yml; do
            HITS=$(grep -nE "echo.*\\\$\{\{.*secrets\." "$f" 2>/dev/null | wc -l)
            if [ "$HITS" -gt 0 ]; then
              FINDINGS="${FINDINGS}CRITICAL|secret-echo|$(basename $f)|$HITS potential secret exposures\n"
              CRITICAL=$((CRITICAL + HITS))
            fi
          done

          # 2. Overly permissive workflow permissions
          for f in .github/workflows/*.yml; do
            if grep -q "permissions: write-all" "$f" 2>/dev/null; then
              FINDINGS="${FINDINGS}HIGH|overpermission|$(basename $f)|write-all permissions\n"
            fi
          done

          # 3. Corporate data leaks
          LEAKS=$(grep -rl "\.intranet\." --include="*.yml" --include="*.json" --include="*.md" \
            --exclude-dir=.git --exclude-dir=patches --exclude-dir=references \
            . 2>/dev/null | wc -l)
          if [ "$LEAKS" -gt 0 ]; then
            FINDINGS="${FINDINGS}HIGH|data-leak|$LEAKS files|Corporate identifiers in non-patch files\n"
          fi

          # 4. Unpinned third-party actions
          UNPINNED=$(grep -rE "uses: [a-z]" .github/workflows/*.yml 2>/dev/null | \
            grep -v "actions/" | grep -v "github/" | grep -v "@[a-f0-9]\{40\}" | wc -l)
          if [ "$UNPINNED" -gt 0 ]; then
            FINDINGS="${FINDINGS}MEDIUM|unpinned-action|$UNPINNED refs|Third-party actions not pinned to SHA\n"
          fi

          echo -e "$FINDINGS" > /tmp/security-findings.txt
          echo "findings<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "critical_count=$CRITICAL" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: security-findings
          path: /tmp/security-findings.txt

  think-quality:
    name: "THINK: Quality Agent"
    needs: observe
    if: inputs.agent == 'all' || inputs.agent == 'quality' || inputs.agent == ''
    runs-on: ubuntu-latest
    outputs:
      findings: ${{ steps.analyze.outputs.findings }}
      error_count: ${{ steps.analyze.outputs.error_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Quality analysis
        id: analyze
        run: |
          FINDINGS=""
          ERRORS=0

          # 1. JSON validity
          for f in schemas/*.json contracts/*.json version.json; do
            if [ -f "$f" ] && ! jq '.' "$f" > /dev/null 2>&1; then
              FINDINGS="${FINDINGS}ERROR|invalid-json|$f\n"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # 2. YAML validity
          for f in .github/workflows/*.yml; do
            if ! python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
              FINDINGS="${FINDINGS}ERROR|invalid-yaml|$f\n"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # 3. Version consistency
          VER=$(jq -r '.version' version.json 2>/dev/null || echo "")
          if [ -n "$VER" ] && [ -f "CHANGELOG.md" ]; then
            if ! grep -q "\[$VER\]" CHANGELOG.md; then
              FINDINGS="${FINDINGS}WARNING|changelog-mismatch|version $VER not in CHANGELOG.md\n"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          # 4. Dead trigger files (pointing to disabled workflows)
          for f in trigger/*.json; do
            [ -f "$f" ] || continue
            # Check if referenced content_ref files exist
            REFS=$(jq -r '.changes[]?.content_ref // empty' "$f" 2>/dev/null)
            for REF in $REFS; do
              if [ ! -f "$REF" ]; then
                FINDINGS="${FINDINGS}WARNING|dead-ref|$f references $REF (not found)\n"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done

          echo -e "$FINDINGS" > /tmp/quality-findings.txt
          echo "findings<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "error_count=$ERRORS" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: quality-findings
          path: /tmp/quality-findings.txt

  think-dashboard:
    name: "THINK: Dashboard Agent"
    needs: observe
    if: inputs.agent == 'all' || inputs.agent == 'dashboard' || inputs.agent == ''
    runs-on: ubuntu-latest
    outputs:
      findings: ${{ steps.analyze.outputs.findings }}
    steps:
      - uses: actions/checkout@v4

      - name: Dashboard analysis
        id: analyze
        run: |
          FINDINGS=""

          # 1. State.json freshness
          if [ -f "panel/dashboard/state.json" ]; then
            LAST_UPDATE=$(jq -r '.lastUpdated // .timestamp // "unknown"' panel/dashboard/state.json 2>/dev/null)
            FINDINGS="${FINDINGS}INFO|state-freshness|Last updated: $LAST_UPDATE\n"
          fi

          # 2. HTML validity (basic check)
          if [ -f "panel/index.html" ]; then
            OPEN_DIVS=$(grep -c "<div" panel/index.html 2>/dev/null || echo 0)
            CLOSE_DIVS=$(grep -c "</div>" panel/index.html 2>/dev/null || echo 0)
            if [ "$OPEN_DIVS" != "$CLOSE_DIVS" ]; then
              FINDINGS="${FINDINGS}WARNING|html-mismatch|panel/index.html has $OPEN_DIVS opening vs $CLOSE_DIVS closing divs\n"
            fi
          fi

          # 3. Version display check
          VER=$(jq -r '.version' version.json 2>/dev/null || echo "")
          if [ -n "$VER" ] && [ -f "panel/index.html" ]; then
            if ! grep -q "version" panel/index.html 2>/dev/null; then
              FINDINGS="${FINDINGS}IMPROVEMENT|version-display|Dashboard should show product version\n"
            fi
          fi

          echo -e "$FINDINGS" > /tmp/dashboard-findings.txt
          echo "findings<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-findings
          path: /tmp/dashboard-findings.txt

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PLAN: Consolidate findings and decide actions
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  plan:
    name: "PLAN: Consolidate & Decide"
    needs: [observe, think-devops, think-security, think-quality, think-dashboard]
    if: always() && needs.observe.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.decide.outputs.action }}
      risk_score: ${{ steps.decide.outputs.risk_score }}
      summary: ${{ steps.decide.outputs.summary }}
    steps:
      - name: Consolidate findings
        id: decide
        run: |
          DEVOPS_FIXES="${{ needs.think-devops.outputs.fix_count || '0' }}"
          SECURITY_CRITICAL="${{ needs.think-security.outputs.critical_count || '0' }}"
          QUALITY_ERRORS="${{ needs.think-quality.outputs.error_count || '0' }}"

          TOTAL=$((DEVOPS_FIXES + SECURITY_CRITICAL + QUALITY_ERRORS))

          # Calculate risk score (0-10)
          RISK=0
          [ "$SECURITY_CRITICAL" -gt 0 ] && RISK=$((RISK + 3))
          [ "$QUALITY_ERRORS" -gt 3 ] && RISK=$((RISK + 2))
          [ "$DEVOPS_FIXES" -gt 5 ] && RISK=$((RISK + 1))
          [ "$TOTAL" -gt 10 ] && RISK=$((RISK + 2))

          # Decide action
          MODE="${{ inputs.mode || 'auto' }}"
          if [ "$MODE" = "analyze" ]; then
            ACTION="report-only"
          elif [ "$RISK" -gt 7 ]; then
            ACTION="escalate"
          elif [ "$SECURITY_CRITICAL" -gt 0 ]; then
            ACTION="escalate"
          elif [ "$TOTAL" -eq 0 ]; then
            ACTION="none"
          else
            ACTION="auto-fix"
          fi

          SUMMARY="DevOps:${DEVOPS_FIXES} Security:${SECURITY_CRITICAL} Quality:${QUALITY_ERRORS} Total:${TOTAL} Risk:${RISK}/10"

          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "risk_score=$RISK" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

          echo "## Decision" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Action | $ACTION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Risk | $RISK/10 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Summary | $SUMMARY |" >> "$GITHUB_STEP_SUMMARY"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # ACT: Implement or escalate
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  act-autofix:
    name: "ACT: Auto-Fix (Low Risk)"
    needs: [observe, plan, think-devops]
    if: needs.plan.outputs.action == 'auto-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create branch
        id: branch
        run: |
          BRANCH="${{ env.IMPROVEMENT_BRANCH_PREFIX }}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git config user.name "autopilot[bot]"
          git config user.email "autopilot[bot]@users.noreply.github.com"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Apply DevOps fixes
        run: |
          # Upgrade deprecated actions
          for f in .github/workflows/*.yml; do
            sed -i 's|actions/checkout@v3|actions/checkout@v4|g' "$f" 2>/dev/null || true
            sed -i 's|actions/setup-node@v3|actions/setup-node@v4|g' "$f" 2>/dev/null || true
            sed -i 's|actions/cache@v3|actions/cache@v4|g' "$f" 2>/dev/null || true
            sed -i 's|actions/upload-artifact@v3|actions/upload-artifact@v4|g' "$f" 2>/dev/null || true
            sed -i 's|actions/download-artifact@v3|actions/download-artifact@v4|g' "$f" 2>/dev/null || true
          done

      - name: Validate fixes
        run: |
          ERRORS=0
          for f in .github/workflows/*.yml; do
            if ! python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
              echo "::error ::Fix broke YAML: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error ::Validation failed. Rolling back."
            git checkout -- .
            exit 1
          fi

      - name: Commit, push, PR
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH="${{ steps.branch.outputs.branch }}"
          SUMMARY="${{ needs.plan.outputs.summary }}"

          git add -A
          git commit -m "fix: autonomous agent improvements

          $SUMMARY

          Applied by: agent-autonomous-improve
          Risk score: ${{ needs.plan.outputs.risk_score }}/10
          [skip ci]"
          git push -u origin "$BRANCH"

      - name: Create auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet HEAD~1 2>/dev/null; then
            echo "No changes to PR"
            exit 0
          fi
          BRANCH="${{ steps.branch.outputs.branch }}"
          gh pr create \
            --title "fix: Autonomous agent improvements (risk ${{ needs.plan.outputs.risk_score }}/10)" \
            --body "## Autonomous Improvements

          **Risk Score**: ${{ needs.plan.outputs.risk_score }}/10
          **Summary**: ${{ needs.plan.outputs.summary }}
          **Mode**: Auto-fix (low risk, pre-validated)

          ### Agent Findings
          - DevOps: ${{ needs.think-devops.outputs.fix_count || '0' }} fixes
          - Security: ${{ needs.think-security.outputs.critical_count || '0' }} critical findings
          - Quality: ${{ needs.think-quality.outputs.error_count || '0' }} issues

          ### Validation
          - [x] YAML syntax validated post-fix
          - [x] Risk score within auto-fix threshold
          - [x] No breaking changes detected

          ---
          *Autonomous improvement by the Agent Team.*" \
            --base main \
            --head "$BRANCH"

  act-escalate:
    name: "ACT: Escalate (High Risk)"
    needs: [observe, plan, think-security, think-quality]
    if: needs.plan.outputs.action == 'escalate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create escalation issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[Agent Team] High-risk findings need review (risk ${{ needs.plan.outputs.risk_score }}/10)"

          # Check for existing open issue
          EXISTING=$(gh issue list --label "agent-team,needs-review" --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "## Updated Findings ($(date -u +%Y-%m-%dT%H:%M:%SZ))

          **Summary**: ${{ needs.plan.outputs.summary }}
          **Risk Score**: ${{ needs.plan.outputs.risk_score }}/10

          Security critical: ${{ needs.think-security.outputs.critical_count || '0' }}
          Quality errors: ${{ needs.think-quality.outputs.error_count || '0' }}"
            echo "Updated existing issue #$EXISTING"
          else
            gh issue create \
              --title "$TITLE" \
              --label "agent-team,needs-review,priority-high" \
              --body "## Agent Team Escalation

          **Risk Score**: ${{ needs.plan.outputs.risk_score }}/10
          **Summary**: ${{ needs.plan.outputs.summary }}

          ### Why Escalated
          Risk score exceeds auto-fix threshold (>7) or critical security findings detected.

          ### Findings
          **Security**: ${{ needs.think-security.outputs.findings || 'None' }}
          **Quality**: ${{ needs.think-quality.outputs.findings || 'None' }}

          ### Recommended Action
          Review findings and either approve auto-fix or implement manually.

          ---
          *Escalated by Agent Team Orchestrator*"
          fi

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # LEARN: Record outcomes for next cycle
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  learn:
    name: "LEARN: Record Outcomes"
    needs: [observe, plan, act-autofix, act-escalate]
    if: always() && needs.observe.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Record cycle outcome
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTCOME=$(jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg version "${{ needs.observe.outputs.version }}" \
            --arg action "${{ needs.plan.outputs.action || 'none' }}" \
            --arg risk "${{ needs.plan.outputs.risk_score || '0' }}" \
            --arg summary "${{ needs.plan.outputs.summary || 'No findings' }}" \
            --arg run "${{ github.run_id }}" \
            '{
              timestamp: $ts,
              productVersion: $version,
              action: $action,
              riskScore: ($risk | tonumber),
              summary: $summary,
              runId: $run
            }')

          echo "## Cycle Complete" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$OUTCOME" | jq '.' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
