name: "[Core] Smart PR Manager"
run-name: "${{ github.workflow }} • sweep open PRs"

# INTELLIGENT PR management. Runs every 5 minutes.
# Handles EVERYTHING automatically:
# - Draft PRs → mark as ready
# - Conflict PRs → update branch (rebase from main)
# - Pending checks → skip merge-related suites, merge if real checks pass
# - Approval → auto-approve via review
# - Merge → squash merge + cleanup branch
# - Fork PRs (codex) → merge if green, close if stale (>3 days with conflicts)
# - Dependabot stale → comment @dependabot rebase, close if >7 days
# - Dangerous PRs (CODEOWNERS) → auto-close with explanation
# - Unmergeable PRs → escalate to @claude after 2 days
# ZERO manual intervention required.

on:
  schedule:
    - cron: '*/15 * * * *'  # Optimized: was */5 (288→96 runs/day). PR trigger handles immediate response.
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: auto-merge-sweeper
  cancel-in-progress: false

jobs:
  sweep-and-merge:
    name: "Sweep & merge agent PRs"
    runs-on: ubuntu-latest
    steps:
      - name: Find, review, resolve conflicts, and merge eligible PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const mergedPRs = [];
            const skippedPRs = [];
            const closedPRs = [];
            const escalatedPRs = [];

            // List all open PRs
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 30, sort: 'created', direction: 'asc'
            });

            if (prs.length === 0) {
              core.notice('No open PRs found.');
              return;
            }

            core.notice(`Found ${prs.length} open PR(s). Processing...`);

            // ── HELPER: Age in days ──
            const ageDays = (dateStr) => Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);

            // ── HELPER: Check for dangerous files ──
            const dangerousPatterns = ['CODEOWNERS'];
            const isDangerous = async (prNum) => {
              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner, repo, pull_number: prNum, per_page: 100
                });
                return files.some(f => dangerousPatterns.some(p => f.filename.includes(p)));
              } catch { return false; }
            };

            for (const pr of prs) {
              const branch = pr.head.ref;
              const prNumber = pr.number;
              const age = ageDays(pr.created_at);
              const isFork = !(pr.head.repo && pr.head.repo.full_name === pr.base.repo.full_name);
              const isDependabot = pr.user.login === 'dependabot[bot]';

              // ── GATE 0: Dangerous PRs (CODEOWNERS, etc) → auto-close ──
              if (await isDangerous(prNumber)) {
                core.warning(`PR #${prNumber}: modifies dangerous file (CODEOWNERS) — auto-closing.`);
                try {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber,
                    body: '⚠️ **Auto-closed by Smart PR Manager**: This PR modifies `CODEOWNERS` which would block the autonomous agent workflow. If this change is needed, request explicit owner approval first.'
                  });
                  await github.rest.pulls.update({ owner, repo, pull_number: prNumber, state: 'closed' });
                  closedPRs.push(`#${prNumber}: dangerous file (CODEOWNERS)`);
                } catch (e) { core.warning(`#${prNumber}: close failed: ${e.message}`); }
                continue;
              }

              // Agent branches from registry + dependabot
              const knownPrefixes = ['claude/', 'copilot/', 'codex/', 'agent/', 'devin/', 'dependabot/'];
              const isAgent = knownPrefixes.some(p => branch.startsWith(p));
              if (!isAgent) {
                skippedPRs.push(`#${prNumber}: not agent branch`);
                continue;
              }

              // Only PRs targeting main
              if (pr.base.ref !== 'main') {
                skippedPRs.push(`#${prNumber}: targets ${pr.base.ref}`);
                continue;
              }

              // ── GATE 1: Stale dependabot PRs → rebase or close ──
              if (isDependabot) {
                if (age > 7) {
                  core.notice(`PR #${prNumber}: dependabot stale (${age} days) — closing.`);
                  try {
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: prNumber,
                      body: `Closing: stale for ${age} days. @dependabot recreate`
                    });
                    await github.rest.pulls.update({ owner, repo, pull_number: prNumber, state: 'closed' });
                    closedPRs.push(`#${prNumber}: dependabot stale ${age}d`);
                  } catch (e) { core.warning(`#${prNumber}: close failed: ${e.message}`); }
                  continue;
                }
                if (age > 2) {
                  // Try to rebase dependabot PR
                  try {
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: prNumber,
                      body: '@dependabot rebase'
                    });
                    core.notice(`PR #${prNumber}: requested dependabot rebase.`);
                  } catch (e) {}
                  // Don't skip — still try to merge below
                }
              }

              // ── GATE 2: Fork PRs (codex) — can't update branch, handle differently ──
              if (isFork) {
                // Try to merge directly — if green, it works
                const { data: prDetail } = await github.rest.pulls.get({
                  owner, repo, pull_number: prNumber
                });

                if (prDetail.mergeable === false || prDetail.mergeable_state === 'dirty') {
                  if (age > 3) {
                    core.notice(`PR #${prNumber}: fork with conflicts for ${age} days — closing.`);
                    try {
                      await github.rest.issues.createComment({
                        owner, repo, issue_number: prNumber,
                        body: `⚠️ **Auto-closed by Smart PR Manager**: Fork PR with unresolved conflicts for ${age} days. Cannot update fork branches automatically. Please rebase on latest \`main\` and reopen, or the change will be re-applied if still needed.`
                      });
                      await github.rest.pulls.update({ owner, repo, pull_number: prNumber, state: 'closed' });
                      closedPRs.push(`#${prNumber}: fork conflicts ${age}d`);
                    } catch (e) { core.warning(`#${prNumber}: close failed: ${e.message}`); }
                    continue;
                  }
                  skippedPRs.push(`#${prNumber}: fork with conflicts (${age}d old, closes at 3d)`);
                  continue;
                }
                // Fork is mergeable — fall through to merge logic below
              }

              // ── STEP 1: Draft → Ready ──
              if (pr.draft) {
                core.notice(`PR #${prNumber}: draft → marking as ready...`);
                try {
                  await github.graphql(`
                    mutation($id: ID!) {
                      markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                        pullRequest { number isDraft }
                      }
                    }
                  `, { id: pr.node_id });
                  core.notice(`PR #${prNumber}: marked as ready.`);
                } catch (e) {
                  core.warning(`PR #${prNumber}: could not mark ready: ${e.message}`);
                }
                continue; // Next sweep will handle merge
              }

              // ── STEP 2: Auto-approve (if no reviews yet) ──
              try {
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner, repo, pull_number: prNumber
                });
                const hasApproval = reviews.some(r => r.state === 'APPROVED');
                if (!hasApproval) {
                  try {
                    await github.rest.pulls.createReview({
                      owner, repo, pull_number: prNumber,
                      event: 'APPROVE',
                      body: 'Auto-approved by sweeper for agent branch.'
                    });
                    core.notice(`PR #${prNumber}: auto-approved.`);
                  } catch (e) {
                    // Can't self-approve own PRs — that's fine, merge still works
                    core.notice(`PR #${prNumber}: could not auto-approve (${e.message}) — proceeding.`);
                  }
                }
              } catch (e) {
                core.notice(`PR #${prNumber}: could not check reviews: ${e.message}`);
              }

              // ── STEP 3: Check mergeable state & resolve conflicts ──
              const { data: prDetail } = await github.rest.pulls.get({
                owner, repo, pull_number: prNumber
              });

              if (prDetail.mergeable === false || prDetail.mergeable_state === 'dirty') {
                core.notice(`PR #${prNumber}: has conflicts — attempting to update branch...`);
                try {
                  await github.rest.pulls.updateBranch({
                    owner, repo, pull_number: prNumber
                  });
                  core.notice(`PR #${prNumber}: branch updated. Will merge on next sweep.`);
                } catch (e) {
                  core.warning(`PR #${prNumber}: could not update branch: ${e.message}`);
                  // Stale with unresolvable conflicts → escalate or close
                  if (age > 5) {
                    core.notice(`PR #${prNumber}: conflicts for ${age} days — closing.`);
                    try {
                      await github.rest.issues.createComment({
                        owner, repo, issue_number: prNumber,
                        body: `⚠️ **Auto-closed by Smart PR Manager**: Unresolvable merge conflicts for ${age} days. Branch update failed. The change will be re-applied by Claude Code if still needed.`
                      });
                      await github.rest.pulls.update({ owner, repo, pull_number: prNumber, state: 'closed' });
                      closedPRs.push(`#${prNumber}: conflicts ${age}d`);
                    } catch (closeErr) { core.warning(`#${prNumber}: close failed: ${closeErr.message}`); }
                  } else if (age > 2) {
                    // Escalate to @claude for intelligent conflict resolution
                    try {
                      const existingComments = await github.rest.issues.listComments({
                        owner, repo, issue_number: prNumber, per_page: 50
                      });
                      const alreadyEscalated = existingComments.data.some(c => c.body.includes('@claude'));
                      if (!alreadyEscalated) {
                        await github.rest.issues.createComment({
                          owner, repo, issue_number: prNumber,
                          body: `@claude This PR has merge conflicts that auto-update cannot resolve (${age} days old). Please diagnose the conflicts, apply the changes from this branch onto latest main, and create a new clean PR. Branch: \`${branch}\``
                        });
                        escalatedPRs.push(`#${prNumber}: conflicts escalated to @claude`);
                      }
                    } catch (escErr) { core.warning(`#${prNumber}: escalation failed: ${escErr.message}`); }
                  }
                }
                continue;
              }

              // ── STEP 4: Check suites (skip merge-related workflows) ──
              const { data: checkSuites } = await github.rest.checks.listSuitesForRef({
                owner, repo, ref: pr.head.sha, per_page: 100
              });

              // Get IDs of merge-related workflow runs to exclude
              const excludeIds = new Set();
              try {
                const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner, repo, status: 'in_progress', per_page: 20
                });
                const mergeNames = ['Auto-Merge Sweeper', 'Autonomous Direct Merge'];
                for (const run of runs.workflow_runs) {
                  if (mergeNames.some(n => run.name.includes(n)) && run.check_suite_id) {
                    excludeIds.add(run.check_suite_id);
                  }
                }
              } catch (e) {}

              // Filter: exclude merge workflows + queued suites (need approval, will never complete)
              const relevant = checkSuites.check_suites.filter(s =>
                !excludeIds.has(s.id) &&
                s.status !== 'queued'
              );

              const pending = relevant.filter(s => s.status !== 'completed');
              const failed = relevant.filter(s =>
                s.status === 'completed' &&
                !['success', 'neutral', 'skipped'].includes(s.conclusion)
              );

              if (pending.length > 0) {
                skippedPRs.push(`#${prNumber}: ${pending.length} checks pending`);
                continue;
              }

              if (failed.length > 0) {
                core.warning(`PR #${prNumber}: ${failed.length} check(s) failed.`);
                // If checks have been failing for >1 day, escalate to @claude
                if (age > 1) {
                  try {
                    const { data: existingComments } = await github.rest.issues.listComments({
                      owner, repo, issue_number: prNumber, per_page: 50
                    });
                    const alreadyEscalated = existingComments.data
                      ? existingComments.data.some(c => c.body && c.body.includes('@claude') && c.body.includes('checks failed'))
                      : existingComments.some(c => c.body && c.body.includes('@claude') && c.body.includes('checks failed'));
                    if (!alreadyEscalated) {
                      await github.rest.issues.createComment({
                        owner, repo, issue_number: prNumber,
                        body: `@claude This PR has ${failed.length} failing check(s) for ${age} day(s). Please investigate the CI failures, fix the issues, and push to branch \`${branch}\`. If unfixable, close this PR and re-apply the changes cleanly.`
                      });
                      escalatedPRs.push(`#${prNumber}: CI failed, escalated to @claude`);
                    }
                  } catch (e) { core.warning(`#${prNumber}: escalation failed: ${e.message}`); }
                }
                // Close if failing for >5 days
                if (age > 5) {
                  try {
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: prNumber,
                      body: `⚠️ **Auto-closed by Smart PR Manager**: CI checks failing for ${age} days without resolution. The change will be re-applied by Claude Code if still needed.`
                    });
                    await github.rest.pulls.update({ owner, repo, pull_number: prNumber, state: 'closed' });
                    closedPRs.push(`#${prNumber}: CI failed ${age}d`);
                  } catch (e) { core.warning(`#${prNumber}: close failed: ${e.message}`); }
                } else {
                  skippedPRs.push(`#${prNumber}: checks failed (${age}d, escalates at 1d, closes at 5d)`);
                }
                continue;
              }

              // ── STEP 5: MERGE ──
              core.notice(`PR #${prNumber} (${branch}): all clear. Merging...`);
              try {
                const result = await github.rest.pulls.merge({
                  owner, repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${prNumber})`,
                  commit_message: `Auto-merged by sweeper from ${branch}`
                });
                core.notice(`PR #${prNumber}: MERGED! SHA: ${result.data.sha}`);
                mergedPRs.push(`#${prNumber}: ${pr.title}`);

                // Cleanup branch
                try {
                  await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
                } catch (e) {}
              } catch (e) {
                core.warning(`PR #${prNumber}: merge failed: ${e.message}`);
                skippedPRs.push(`#${prNumber}: merge failed (${e.message})`);
              }
            }

            // Summary
            const lines = [`## Smart PR Manager — ${new Date().toISOString()}`];
            if (mergedPRs.length > 0) {
              lines.push(`\n### ✅ Merged (${mergedPRs.length})`);
              mergedPRs.forEach(p => lines.push(`- ${p}`));
            }
            if (closedPRs.length > 0) {
              lines.push(`\n### 🗑️ Closed (${closedPRs.length})`);
              closedPRs.forEach(p => lines.push(`- ${p}`));
            }
            if (escalatedPRs.length > 0) {
              lines.push(`\n### 🔔 Escalated to @claude (${escalatedPRs.length})`);
              escalatedPRs.forEach(p => lines.push(`- ${p}`));
            }
            if (skippedPRs.length > 0) {
              lines.push(`\n### ⏭️ Skipped (${skippedPRs.length})`);
              skippedPRs.forEach(p => lines.push(`- ${p}`));
            }
            if (mergedPRs.length === 0 && skippedPRs.length === 0 && closedPRs.length === 0) {
              lines.push('\nNo open PRs found.');
            }
            await core.summary.addRaw(lines.join('\n')).write();
