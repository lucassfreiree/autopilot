name: "[Core] Auto-Merge Sweeper"
run-name: "${{ github.workflow }} • sweep open agent PRs"

# Runs every 5 minutes and auto-merges ANY open PR from agent branches
# that has passed all checks. This bypasses the "Action required" approval
# issue with pull_request_target workflows.
#
# This is the DEFINITIVE solution: no PR event triggers needed,
# no approval required, just a cron that sweeps and merges.

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-sweeper
  cancel-in-progress: false

jobs:
  sweep-and-merge:
    name: "Sweep & merge agent PRs"
    runs-on: ubuntu-latest
    steps:
      - name: Find and merge eligible PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // List all open PRs
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 30, sort: 'created', direction: 'asc'
            });

            if (prs.length === 0) {
              core.notice('No open PRs found.');
              return;
            }

            core.notice(`Found ${prs.length} open PR(s). Checking eligibility...`);

            for (const pr of prs) {
              const branch = pr.head.ref;
              const prNumber = pr.number;

              // Only agent branches
              const isAgent = branch.startsWith('copilot/') ||
                              branch.startsWith('claude/')  ||
                              branch.startsWith('codex/');
              if (!isAgent) {
                core.notice(`PR #${prNumber} (${branch}): not an agent branch, skipping.`);
                continue;
              }

              // Only PRs targeting main
              if (pr.base.ref !== 'main') {
                core.notice(`PR #${prNumber}: targets ${pr.base.ref}, not main. Skipping.`);
                continue;
              }

              // Skip forks
              const sameRepo = pr.head.repo && pr.head.repo.full_name === pr.base.repo.full_name;
              if (!sameRepo) {
                core.notice(`PR #${prNumber}: fork PR, skipping.`);
                continue;
              }

              // Auto-mark draft as ready
              if (pr.draft) {
                core.notice(`PR #${prNumber}: draft → marking as ready...`);
                try {
                  await github.graphql(`
                    mutation($id: ID!) {
                      markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                        pullRequest { number isDraft }
                      }
                    }
                  `, { id: pr.node_id });
                  core.notice(`PR #${prNumber}: marked as ready. Will merge on next sweep.`);
                } catch (e) {
                  core.warning(`PR #${prNumber}: could not mark ready: ${e.message}`);
                }
                continue; // Next sweep will merge it
              }

              // Check if checks passed
              const { data: checks } = await github.rest.checks.listSuitesForRef({
                owner, repo, ref: pr.head.sha, per_page: 100
              });

              const pending = checks.check_suites.filter(s => s.status !== 'completed');
              const failed = checks.check_suites.filter(s =>
                s.status === 'completed' &&
                !['success', 'neutral', 'skipped'].includes(s.conclusion)
              );

              if (pending.length > 0) {
                core.notice(`PR #${prNumber}: ${pending.length} check(s) still pending. Will retry next sweep.`);
                continue;
              }

              if (failed.length > 0) {
                core.notice(`PR #${prNumber}: ${failed.length} check(s) failed. Skipping.`);
                continue;
              }

              // All checks passed (or no checks) → MERGE
              core.notice(`PR #${prNumber} (${branch}): all checks passed. Merging...`);
              try {
                const result = await github.rest.pulls.merge({
                  owner, repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${prNumber})`,
                  commit_message: `Auto-merged by sweeper from ${branch}`
                });
                core.notice(`PR #${prNumber}: MERGED! SHA: ${result.data.sha}`);

                // Cleanup branch
                try {
                  await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
                  core.notice(`PR #${prNumber}: branch ${branch} deleted.`);
                } catch (e) {
                  core.notice(`PR #${prNumber}: could not delete branch: ${e.message}`);
                }
              } catch (e) {
                core.warning(`PR #${prNumber}: merge failed: ${e.message}`);
              }
            }

      - name: Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toISOString();
            await core.summary
              .addRaw(`## Auto-Merge Sweeper\nRan at: ${now}`)
              .write();
