name: "Stale PR Cleanup"

# Uses actions/stale (official GitHub action, 1.2k+ stars)
# Auto-warns and closes abandoned PRs to keep repo clean

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: stale-pr-cleanup
  cancel-in-progress: false

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # PRs
          stale-pr-message: >
            This PR has been inactive for 7 days. It will be automatically closed
            in 3 days if no activity occurs. If this PR is still needed, please
            update it or leave a comment.
          close-pr-message: >
            This PR was closed due to inactivity (10+ days without updates).
            Feel free to reopen if still needed.
          days-before-pr-stale: 7
          days-before-pr-close: 3
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,do-not-close,in-progress'
          # Don't touch Issues (stale-issue-cleanup.yml handles those)
          days-before-issue-stale: -1
          days-before-issue-close: -1
          # Limits
          operations-per-run: 30
