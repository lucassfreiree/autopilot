name: "[Core] Compliance Gate"
run-name: "${{ github.workflow }} • ${{ github.event_name }}"

# Runs on PRs that touch deploy-related files AND can be called by apply-source-change
on:
  pull_request:
    branches: [main]
    paths:
      - 'patches/**'
      - 'trigger/source-change.json'
      - 'references/controller-cap/**'
      - 'references/agent-cap/**'
  workflow_call:
    inputs:
      trigger_json_b64:
        description: "Base64 encoded trigger/source-change.json content"
        type: string
        required: false
      patches_dir:
        description: "Path to patches directory"
        type: string
        required: false
        default: "patches"
    outputs:
      passed:
        description: "Whether all compliance checks passed"
        value: ${{ jobs.compliance.outputs.passed }}
      violations:
        description: "JSON array of violations found"
        value: ${{ jobs.compliance.outputs.violations }}
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  compliance:
    name: "Compliance Checks"
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.result.outputs.passed }}
      violations: ${{ steps.result.outputs.violations }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Run compliance checks"
        id: checks
        run: |
          set -euo pipefail

          VIOLATIONS="[]"
          WARNINGS="[]"
          add_violation() { VIOLATIONS=$(echo "$VIOLATIONS" | jq --arg r "$1" --arg m "$2" --arg s "$3" '. + [{rule: $r, message: $m, severity: $s}]'); }
          add_warning() { WARNINGS=$(echo "$WARNINGS" | jq --arg r "$1" --arg m "$2" '. + [{rule: $r, message: $m}]'); }

          echo "::group::📋 Reading trigger file"
          if [ -n "${{ inputs.trigger_json_b64 }}" ]; then
            TRIGGER=$(echo "${{ inputs.trigger_json_b64 }}" | base64 -d 2>/dev/null)
          elif [ -f trigger/source-change.json ]; then
            TRIGGER=$(cat trigger/source-change.json)
          else
            echo "::notice ::No trigger file found — skipping trigger checks"
            TRIGGER="{}"
          fi
          echo "$TRIGGER" | jq . 2>/dev/null || echo "Invalid JSON"
          echo "::endgroup::"

          VERSION=$(echo "$TRIGGER" | jq -r '.version // ""' 2>/dev/null)
          COMPONENT=$(echo "$TRIGGER" | jq -r '.component // ""' 2>/dev/null)
          RUN=$(echo "$TRIGGER" | jq -r '.run // 0' 2>/dev/null)
          CHANGES=$(echo "$TRIGGER" | jq -r '.changes // []' 2>/dev/null)

          # ══════════════════════════════════════════════
          # RULE 1: Version format — never X.Y.10+
          # ══════════════════════════════════════════════
          echo "::group::🔢 Rule 1: Version format"
          if [ -n "$VERSION" ] && [ "$VERSION" != "null" ]; then
            PATCH=$(echo "$VERSION" | grep -oP '\.\K[0-9]+$' || echo "0")
            if [ "$PATCH" -ge 10 ] 2>/dev/null; then
              add_violation "version-format" "Version $VERSION has patch >= 10. After X.Y.9, next must be X.(Y+1).0" "error"
            else
              echo "✅ Version $VERSION format OK (patch=$PATCH)"
            fi
          fi
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 2: Swagger ASCII-only (no accented chars)
          # ══════════════════════════════════════════════
          echo "::group::📝 Rule 2: Swagger ASCII-only"
          SWAGGER_FILES=$(find patches/ -name "*.json" -path "*swagger*" 2>/dev/null || true)
          for f in $SWAGGER_FILES; do
            if grep -P '[\x80-\xFF]' "$f" > /dev/null 2>&1; then
              BAD_LINES=$(grep -nP '[\x80-\xFF]' "$f" | head -5)
              add_violation "swagger-ascii" "Swagger file $f contains non-ASCII characters (accented). Lines: $BAD_LINES" "error"
            else
              echo "✅ $f — ASCII only"
            fi
          done
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 3: JWT scope claim — singular not plural
          # ══════════════════════════════════════════════
          echo "::group::🔐 Rule 3: JWT scope claim"
          PATCH_TS_FILES=$(find patches/ -name "*.ts" 2>/dev/null || true)
          for f in $PATCH_TS_FILES; do
            # Check for 'scopes' (plural) in JWT context
            if grep -n "payload\.scopes\b\|claim.*scopes\|'scopes'" "$f" > /dev/null 2>&1; then
              BAD=$(grep -n "payload\.scopes\b\|claim.*scopes\|'scopes'" "$f" | head -3)
              add_violation "jwt-scope-singular" "File $f uses 'scopes' (plural). Agent reads payload.scope (SINGULAR). Lines: $BAD" "error"
            fi
          done
          echo "✅ JWT scope check done"
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 4: No validateTrustedUrl inside fetch/postJson
          # ══════════════════════════════════════════════
          echo "::group::🌐 Rule 4: No validateTrustedUrl in fetch helpers"
          for f in $PATCH_TS_FILES; do
            if grep -n "validateTrustedUrl" "$f" > /dev/null 2>&1; then
              # Check if it's inside a fetch/postJson/callAgent function
              if grep -B5 "validateTrustedUrl" "$f" | grep -q "fetch\|postJson\|callAgent\|http\.request"; then
                add_violation "no-validate-in-fetch" "File $f has validateTrustedUrl inside fetch/postJson — breaks mock tests" "error"
              else
                add_warning "validate-url-location" "File $f uses validateTrustedUrl — verify it's at input level, not inside fetch"
              fi
            fi
          done
          echo "✅ Fetch validation check done"
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 5: No nested ternaries (ESLint)
          # ══════════════════════════════════════════════
          echo "::group::🔀 Rule 5: No nested ternaries"
          for f in $PATCH_TS_FILES; do
            # Simple heuristic: line with 2+ ? operators
            NESTED=$(grep -nP '\?[^?]*\?' "$f" | grep -v '//' | grep -v '\*' | head -3 || true)
            if [ -n "$NESTED" ]; then
              add_warning "no-nested-ternary" "File $f may have nested ternaries (ESLint will reject): $NESTED"
            fi
          done
          echo "✅ Ternary check done"
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 6: search-replace must be single-line
          # ══════════════════════════════════════════════
          echo "::group::📏 Rule 6: search-replace single-line only"
          if [ "$CHANGES" != "[]" ] && [ "$CHANGES" != "null" ]; then
            echo "$CHANGES" | jq -c '.[]' 2>/dev/null | while read -r change; do
              ACTION=$(echo "$change" | jq -r '.action // ""')
              SEARCH=$(echo "$change" | jq -r '.search // ""')
              if [ "$ACTION" = "search-replace" ]; then
                if echo "$SEARCH" | grep -q '\\n\|\\r'; then
                  add_violation "search-replace-newlines" "search-replace contains newlines — sed cannot handle. Use replace-file instead" "error"
                fi
              fi
            done
          fi
          echo "✅ search-replace check done"
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 7: Trigger run must be incremented
          # ══════════════════════════════════════════════
          echo "::group::🔄 Rule 7: Trigger run incremented"
          if [ "$RUN" != "0" ] && [ -n "$RUN" ]; then
            # Compare with main branch
            MAIN_RUN=$(git show origin/main:trigger/source-change.json 2>/dev/null | jq -r '.run // 0' 2>/dev/null || echo "0")
            if [ "$RUN" -le "$MAIN_RUN" ] 2>/dev/null; then
              add_violation "run-not-incremented" "Trigger run ($RUN) is not greater than main ($MAIN_RUN). Workflow will NOT fire." "error"
            else
              echo "✅ Run incremented: $MAIN_RUN → $RUN"
            fi
          fi
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 8: No corporate secrets/URLs in patches
          # ══════════════════════════════════════════════
          echo "::group::🔒 Rule 8: No corporate secrets in patches"
          ALL_PATCH_FILES=$(find patches/ -type f 2>/dev/null || true)
          for f in $ALL_PATCH_FILES; do
            # Check for hardcoded intranet URLs (should be in env vars)
            if grep -n "\.intranet\." "$f" > /dev/null 2>&1; then
              add_warning "intranet-url" "File $f contains .intranet. URL — ensure it's not hardcoded (should be env var)"
            fi
            # Check for hardcoded secrets patterns
            if grep -niP "(secret|password|token|api.?key)\s*[:=]\s*['\"][^'\"]{8,}" "$f" > /dev/null 2>&1; then
              add_violation "hardcoded-secret" "File $f may contain hardcoded secrets" "error"
            fi
          done
          echo "✅ Secret scan done"
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 9: Version consistency (all 5 places)
          # ══════════════════════════════════════════════
          echo "::group::🔗 Rule 9: Version consistency"
          if [ -n "$VERSION" ] && [ "$VERSION" != "null" ] && [ "$CHANGES" != "[]" ] && [ "$CHANGES" != "null" ]; then
            HAS_PKG=$(echo "$CHANGES" | jq '[.[] | select(.target_path == "package.json")] | length')
            HAS_LOCK=$(echo "$CHANGES" | jq '[.[] | select(.target_path == "package-lock.json")] | length')
            if [ "$HAS_PKG" -gt 0 ] && [ "$HAS_LOCK" -eq 0 ]; then
              add_violation "version-consistency" "package.json version bumped but package-lock.json NOT included — both must be updated" "error"
            fi
            if [ "$HAS_LOCK" -gt 0 ] && [ "$HAS_PKG" -eq 0 ]; then
              add_violation "version-consistency" "package-lock.json updated but package.json NOT included" "error"
            fi
            echo "✅ Version file consistency checked"
          fi
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 10: Workspace isolation
          # ══════════════════════════════════════════════
          echo "::group::🔐 Rule 10: Workspace isolation"
          WS_ID=$(echo "$TRIGGER" | jq -r '.workspace_id // ""' 2>/dev/null)
          if [ "$WS_ID" = "ws-socnew" ] || [ "$WS_ID" = "ws-corp-1" ]; then
            add_violation "blocked-workspace" "Workspace $WS_ID is LOCKED (third-party). DO NOT OPERATE without explicit authorization." "error"
          fi
          echo "✅ Workspace isolation checked"
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RULE 11: Dead code detection (basic)
          # ══════════════════════════════════════════════
          echo "::group::🧹 Rule 11: Dead code detection"
          for f in $PATCH_TS_FILES; do
            # Functions defined but potentially unused (basic heuristic)
            FUNCS=$(grep -oP '(?:function |const )\K\w+(?=\s*[\(=])' "$f" 2>/dev/null | sort -u || true)
            for func in $FUNCS; do
              COUNT=$(grep -c "\b${func}\b" "$f" 2>/dev/null || echo "0")
              if [ "$COUNT" -le 1 ]; then
                add_warning "potential-dead-code" "Function '$func' in $f appears only once (defined but possibly unused — ESLint will flag)"
              fi
            done
          done
          echo "✅ Dead code check done"
          echo "::endgroup::"

          # ══════════════════════════════════════════════
          # RESULTS
          # ══════════════════════════════════════════════
          VIOLATION_COUNT=$(echo "$VIOLATIONS" | jq 'length')
          WARNING_COUNT=$(echo "$WARNINGS" | jq 'length')

          echo "violations_json=$(echo "$VIOLATIONS" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "warnings_json=$(echo "$WARNINGS" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "violation_count=$VIOLATION_COUNT" >> "$GITHUB_OUTPUT"
          echo "warning_count=$WARNING_COUNT" >> "$GITHUB_OUTPUT"

      - name: "Report results"
        id: result
        run: |
          VIOLATIONS='${{ steps.checks.outputs.violations_json }}'
          WARNINGS='${{ steps.checks.outputs.warnings_json }}'
          V_COUNT=${{ steps.checks.outputs.violation_count }}
          W_COUNT=${{ steps.checks.outputs.warning_count }}

          echo "═══════════════════════════════════════"
          echo "  COMPLIANCE GATE RESULTS"
          echo "═══════════════════════════════════════"
          echo ""

          if [ "$W_COUNT" -gt 0 ]; then
            echo "⚠️  WARNINGS ($W_COUNT):"
            echo "$WARNINGS" | jq -r '.[] | "  ⚠️  [\(.rule)] \(.message)"'
            echo ""
          fi

          if [ "$V_COUNT" -gt 0 ]; then
            echo "🔴 VIOLATIONS ($V_COUNT):"
            echo "$VIOLATIONS" | jq -r '.[] | "  🔴 [\(.rule)] \(.message)"'
            echo ""
            echo "═══════════════════════════════════════"
            echo "  ❌ COMPLIANCE GATE: FAILED"
            echo "═══════════════════════════════════════"
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "violations=$(echo "$VIOLATIONS" | jq -c .)" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "═══════════════════════════════════════"
            echo "  ✅ COMPLIANCE GATE: PASSED"
            echo "  ($W_COUNT warnings, 0 violations)"
            echo "═══════════════════════════════════════"
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "violations=[]" >> "$GITHUB_OUTPUT"
          fi

      - name: "Comment on PR"
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V_COUNT=${{ steps.checks.outputs.violation_count }}
          W_COUNT=${{ steps.checks.outputs.warning_count }}
          VIOLATIONS='${{ steps.checks.outputs.violations_json }}'
          WARNINGS='${{ steps.checks.outputs.warnings_json }}'

          if [ "$V_COUNT" -eq 0 ] && [ "$W_COUNT" -eq 0 ]; then
            BODY="## ✅ Compliance Gate: PASSED\nAll 11 checks passed. No violations or warnings."
          elif [ "$V_COUNT" -eq 0 ]; then
            W_LIST=$(echo "$WARNINGS" | jq -r '.[] | "- ⚠️ **\(.rule)**: \(.message)"')
            BODY="## ✅ Compliance Gate: PASSED (with warnings)\n\n### Warnings ($W_COUNT)\n$W_LIST"
          else
            V_LIST=$(echo "$VIOLATIONS" | jq -r '.[] | "- 🔴 **\(.rule)**: \(.message)"')
            W_LIST=$(echo "$WARNINGS" | jq -r '.[] | "- ⚠️ **\(.rule)**: \(.message)"' || echo "")
            BODY="## ❌ Compliance Gate: FAILED\n\n### Violations ($V_COUNT) — must fix before merge\n$V_LIST"
            if [ "$W_COUNT" -gt 0 ]; then
              BODY="$BODY\n\n### Warnings ($W_COUNT)\n$W_LIST"
            fi
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}
          if [ -n "$PR_NUMBER" ]; then
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --method POST \
              -f body="$(echo -e "$BODY")" 2>/dev/null || echo "::warning ::Failed to post PR comment"
          fi
