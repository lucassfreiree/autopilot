# ===========================================================
# REPO:  lucassfreiree/autopilot
# PATH:  .github/workflows/bootstrap.yml
# RETRY: SSO authorized
# ===========================================================
name: "Bootstrap: Setup Completo"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/bootstrap.yml']

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: "1/4 - Criar branch autopilot-state"
        id: step1
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          exec 2> /tmp/step1-err.log
          REPO="lucassfreiree/autopilot"
          echo "Verificando se branch ja existe..."
          if gh api "repos/$REPO/git/refs/heads/autopilot-state" --silent 2>/dev/null; then
            echo "Branch autopilot-state ja existe. Pulando."
            exit 0
          fi
          echo "Criando branch autopilot-state..."
          BASE_SHA=$(gh api "repos/$REPO/git/refs/heads/main" --jq '.object.sha')
          echo "Base SHA: $BASE_SHA"
          gh api "repos/$REPO/git/refs" \
            --method POST \
            -f "ref=refs/heads/autopilot-state" \
            -f "sha=$BASE_SHA"
          echo "Branch criado. Adicionando arquivos de estado..."
          CTRL='{"schemaVersion":1,"tenantId":"bbvinet","component":"psc-sre-automacao-controller","initialized":true,"lastReleasedSha":"","lastTag":"","updatedAt":"","runId":"","note":"Controller via GitLab interno - promocao manual por ora"}'
          CTRL_B64=$(echo "$CTRL" | base64 -w0)
          gh api "repos/$REPO/contents/state/controller-state.json" \
            --method PUT \
            -f "branch=autopilot-state" \
            -f "message=chore: add controller-state.json [skip ci]" \
            -f "content=$CTRL_B64"
          AGENT='{"schemaVersion":1,"tenantId":"bbvinet","component":"psc-sre-automacao-agent","initialized":true,"lastReleasedSha":"","lastTag":"","updatedAt":"","runId":""}'
          AGENT_B64=$(echo "$AGENT" | base64 -w0)
          gh api "repos/$REPO/contents/state/agent-state.json" \
            --method PUT \
            -f "branch=autopilot-state" \
            -f "message=chore: add agent-state.json [skip ci]" \
            -f "content=$AGENT_B64"
          README_B64=$(printf '%s' "# autopilot-state" | base64 -w0)
          gh api "repos/$REPO/contents/README.md" \
            --method PUT \
            -f "branch=autopilot-state" \
            -f "message=chore: add README [skip ci]" \
            -f "content=$README_B64"
          echo "Branch autopilot-state criado com sucesso."

      - name: "2/4 - Criar PR com release-autopilot.yml no repo do agent"
        id: step2
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          exec 2> /tmp/step2-err.log
          TARGET_REPO="bbvinet/psc-sre-automacao-agent"
          TARGET_PATH=".github/workflows/release-autopilot.yml"
          BRANCH_NAME="autopilot/add-release-workflow"
          CONTENT=$(cat .github/workflows/release-autopilot.yml)
          ENCODED=$(echo "$CONTENT" | base64 -w0)
          EXISTING_PR=$(gh api "repos/$TARGET_REPO/pulls?head=bbvinet:$BRANCH_NAME&state=open" \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "PR #$EXISTING_PR ja existe. Pulando."
            echo "PR: https://github.com/$TARGET_REPO/pull/$EXISTING_PR"
            exit 0
          fi
          MAIN_SHA=$(gh api "repos/$TARGET_REPO/git/refs/heads/main" --jq '.object.sha')
          gh api "repos/$TARGET_REPO/git/refs" \
            --method POST \
            -f "ref=refs/heads/$BRANCH_NAME" \
            -f "sha=$MAIN_SHA" 2>/dev/null || true
          EXISTING_FILE=$(gh api "repos/$TARGET_REPO/contents/$TARGET_PATH?ref=$BRANCH_NAME" \
            --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$EXISTING_FILE" ] && [ "$EXISTING_FILE" != "null" ]; then
            gh api "repos/$TARGET_REPO/contents/$TARGET_PATH" \
              --method PUT \
              -f "branch=$BRANCH_NAME" \
              -f "message=chore: update release-autopilot workflow [autopilot]" \
              -f "content=$ENCODED" \
              -f "sha=$EXISTING_FILE"
          else
            gh api "repos/$TARGET_REPO/contents/$TARGET_PATH" \
              --method PUT \
              -f "branch=$BRANCH_NAME" \
              -f "message=chore: add release-autopilot workflow [autopilot]" \
              -f "content=$ENCODED"
          fi
          PR_URL=$(gh api "repos/$TARGET_REPO/pulls" \
            --method POST \
            -f "title=chore: add Autopilot release workflow" \
            -f "head=$BRANCH_NAME" \
            -f "base=main" \
            -f "body=Workflow criado automaticamente pelo Autopilot bootstrap. Dispara release apos CI passar em main." \
            --jq '.html_url')
          echo "PR criado: $PR_URL"

      - name: "3/4 - Configurar secret RELEASE_TOKEN no repo do agent"
        id: step3
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.BBVINET_TOKEN }}
          SECRET_VALUE: ${{ secrets.BBVINET_TOKEN }}
        run: |
          exec 2> /tmp/step3-err.log
          TARGET_REPO="bbvinet/psc-sre-automacao-agent"
          echo "$SECRET_VALUE" | gh secret set RELEASE_TOKEN \
            --repo "$TARGET_REPO"
          echo "Secret RELEASE_TOKEN configurado em $TARGET_REPO"

      - name: "4/4 - Push health-check.yml neste repo"
        id: step4
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          exec 2> /tmp/step4-err.log
          TARGET_REPO="lucassfreiree/autopilot"
          TARGET_PATH=".github/workflows/health-check.yml"
          CONTENT=$(cat .github/workflows/health-check.yml)
          ENCODED=$(echo "$CONTENT" | base64 -w0)
          EXISTING=$(gh api "repos/$TARGET_REPO/contents/$TARGET_PATH" \
            --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh api "repos/$TARGET_REPO/contents/$TARGET_PATH" \
              --method PUT \
              -f "message=chore: update health-check workflow [autopilot bootstrap]" \
              -f "content=$ENCODED" \
              -f "sha=$EXISTING"
          else
            gh api "repos/$TARGET_REPO/contents/$TARGET_PATH" \
              --method PUT \
              -f "message=chore: add health-check workflow [autopilot bootstrap]" \
              -f "content=$ENCODED"
          fi
          echo "health-check.yml criado em $TARGET_REPO"

      - name: Reportar resultado
        if: always()
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          S1="${{ steps.step1.outcome }}"
          S2="${{ steps.step2.outcome }}"
          S3="${{ steps.step3.outcome }}"
          S4="${{ steps.step4.outcome }}"
          if [ "$S1" = "success" ] && [ "$S2" = "success" ] && [ "$S3" = "success" ] && [ "$S4" = "success" ]; then
            STATUS="success"
          else
            STATUS="failure"
          fi
          RUN_URL="https://github.com/lucassfreiree/autopilot/actions/runs/${{ github.run_id }}"
          ERR1=$(cat /tmp/step1-err.log 2>/dev/null | tail -10 || echo "n/a")
          ERR2=$(cat /tmp/step2-err.log 2>/dev/null | tail -10 || echo "n/a")
          ERR3=$(cat /tmp/step3-err.log 2>/dev/null | tail -10 || echo "n/a")
          ERR4=$(cat /tmp/step4-err.log 2>/dev/null | tail -10 || echo "n/a")
          {
            echo "## Bootstrap Run #${{ github.run_number }}"
            echo ""
            echo "| Etapa | Resultado |"
            echo "|-------|-----------|"
            echo "| 1/4 - Branch autopilot-state | ${S1} |"
            echo "| 2/4 - release-autopilot.yml agent | ${S2} |"
            echo "| 3/4 - Secret RELEASE_TOKEN | ${S3} |"
            echo "| 4/4 - health-check.yml | ${S4} |"
            echo ""
            echo "**Run:** ${RUN_URL}"
            echo "**Commit:** \`${{ github.sha }}\`"
            for i in 1 2 3 4; do
              SVAR="S${i}"
              OUTCOME="${!SVAR}"
              if [ "$OUTCOME" = "failure" ]; then
                ERRVAR="ERR${i}"
                echo ""
                echo "### Step ${i} error log:"
                echo '```'
                echo "${!ERRVAR}"
                echo '```'
              fi
            done
          } > /tmp/issue-body.txt
          gh issue create \
            --repo lucassfreiree/autopilot \
            --title "Bootstrap #${{ github.run_number }} - ${STATUS} [s1:${S1} s2:${S2} s3:${S3} s4:${S4}]" \
            --body-file /tmp/issue-body.txt || true

      - name: Falhar se algum step falhou
        if: always()
        run: |
          if [ "${{ steps.step1.outcome }}" = "failure" ] || \
             [ "${{ steps.step2.outcome }}" = "failure" ] || \
             [ "${{ steps.step3.outcome }}" = "failure" ] || \
             [ "${{ steps.step4.outcome }}" = "failure" ]; then
            echo "Um ou mais steps falharam. Veja a issue criada."
            exit 1
          fi
