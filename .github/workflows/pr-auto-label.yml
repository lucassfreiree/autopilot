name: "PR Auto-Label"

# Uses actions/labeler (official GitHub action, 10k+ stars)
# Auto-labels PRs based on changed file paths — zero config maintenance

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: ".github/labeler.yml"
          sync-labels: true
