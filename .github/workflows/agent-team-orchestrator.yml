# ===========================================================
# Agent Team Orchestrator
#
# Coordinates the autonomous agent team for continuous
# improvement of the Autopilot product.
# Agents analyze, plan, implement, validate, and ship
# without human intervention.
#
# Schedule: Weekdays 06:00 UTC
# Can also be triggered manually with focus_area filter.
# ===========================================================
name: "[Agent] Team Orchestrator"

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays at 06:00 UTC
  workflow_dispatch:
    inputs:
      focus_area:
        description: 'Focus area'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - workflows
          - dashboard
          - security
          - quality
          - architecture
      dry_run:
        description: 'Dry run - analyze only, no changes'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: agent-team-orchestrator
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Stage 1: Analyze ──────────────────────────────────
  analyze:
    name: "Analyze"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_improvements: ${{ steps.scan.outputs.has_improvements }}
      improvement_count: ${{ steps.scan.outputs.improvement_count }}
      deprecated_count: ${{ steps.scan.outputs.deprecated_count }}
      missing_perm_count: ${{ steps.scan.outputs.missing_perm_count }}
      security_count: ${{ steps.scan.outputs.security_count }}
      quality_count: ${{ steps.scan.outputs.quality_count }}
      risk_score: ${{ steps.scan.outputs.risk_score }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read product state
        id: state
        run: |
          VERSION=$(jq -r '.version' version.json 2>/dev/null || echo "0.0.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

      - name: Scan all domains
        id: scan
        run: |
          set -euo pipefail
          FOCUS="${{ inputs.focus_area || 'all' }}"
          DEPRECATED=0
          MISSING_PERM=0
          SECURITY=0
          QUALITY=0
          REPORT=""

          # ── DevOps: Deprecated actions (only real uses: lines) ──
          if [ "$FOCUS" = "all" ] || [ "$FOCUS" = "workflows" ]; then
            for f in .github/workflows/*.yml; do
              COUNT=$(grep -cP '^\s+uses:\s+actions/\S+@v3' "$f" 2>/dev/null || true)
              if [ "${COUNT:-0}" -gt 0 ]; then
                DEPRECATED=$((DEPRECATED + COUNT))
                REPORT="${REPORT}devops|deprecated-action|$(basename $f)|$COUNT uses @v3\n"
              fi
            done

            for f in .github/workflows/*.yml; do
              if ! grep -q "permissions:" "$f" 2>/dev/null; then
                MISSING_PERM=$((MISSING_PERM + 1))
                REPORT="${REPORT}devops|missing-permissions|$(basename $f)\n"
              fi
            done

            # Deprecated set-output
            for f in .github/workflows/*.yml; do
              if grep -qP '::set-output\s+name=' "$f" 2>/dev/null; then
                DEPRECATED=$((DEPRECATED + 1))
                REPORT="${REPORT}devops|deprecated-set-output|$(basename $f)\n"
              fi
            done
          fi

          # ── Security ──
          if [ "$FOCUS" = "all" ] || [ "$FOCUS" = "security" ]; then
            # Real hardcoded tokens
            TOKENS=$(grep -rlE "ghp_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16}" \
              --include="*.yml" --include="*.json" --include="*.sh" \
              --exclude-dir=.git . 2>/dev/null | wc -l)
            SECURITY=$((SECURITY + TOKENS))
            [ "$TOKENS" -gt 0 ] && REPORT="${REPORT}security|hardcoded-token|$TOKENS files\n"

            # Injection risk: pull_request_target + checkout
            for f in .github/workflows/*.yml; do
              if grep -q "pull_request_target" "$f" && grep -q "actions/checkout" "$f"; then
                SECURITY=$((SECURITY + 1))
                REPORT="${REPORT}security|injection-risk|$(basename $f)\n"
              fi
            done
          fi

          # ── Quality ──
          if [ "$FOCUS" = "all" ] || [ "$FOCUS" = "quality" ]; then
            for f in schemas/*.json contracts/*.json version.json; do
              if [ -f "$f" ] && ! jq '.' "$f" > /dev/null 2>&1; then
                QUALITY=$((QUALITY + 1))
                REPORT="${REPORT}quality|invalid-json|$f\n"
              fi
            done
            for f in .github/workflows/*.yml; do
              if ! python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
                QUALITY=$((QUALITY + 1))
                REPORT="${REPORT}quality|invalid-yaml|$f\n"
              fi
            done

            # Version/CHANGELOG consistency
            VER=$(jq -r '.version' version.json 2>/dev/null || echo "")
            if [ -n "$VER" ] && ! grep -q "\[$VER\]" CHANGELOG.md 2>/dev/null; then
              QUALITY=$((QUALITY + 1))
              REPORT="${REPORT}quality|changelog-mismatch|$VER not in CHANGELOG\n"
            fi
          fi

          TOTAL=$((DEPRECATED + MISSING_PERM + SECURITY + QUALITY))

          # Risk score
          RISK=0
          [ "$SECURITY" -gt 0 ] && RISK=$((RISK + 4))
          [ "$QUALITY" -gt 0 ] && RISK=$((RISK + 3))
          [ "$TOTAL" -gt 10 ] && RISK=$((RISK + 2))

          echo "has_improvements=$( [ $TOTAL -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "improvement_count=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "deprecated_count=$DEPRECATED" >> "$GITHUB_OUTPUT"
          echo "missing_perm_count=$MISSING_PERM" >> "$GITHUB_OUTPUT"
          echo "security_count=$SECURITY" >> "$GITHUB_OUTPUT"
          echo "quality_count=$QUALITY" >> "$GITHUB_OUTPUT"
          echo "risk_score=$RISK" >> "$GITHUB_OUTPUT"

          echo -e "$REPORT" > /tmp/report.txt

          echo "## Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Domain | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deprecated actions | $DEPRECATED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Missing permissions | $MISSING_PERM |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security findings | $SECURITY |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quality issues | $QUALITY |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total** | **$TOTAL** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Risk score | $RISK/10 |" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: steps.scan.outputs.has_improvements == 'true'
        with:
          name: scan-report
          path: /tmp/report.txt
          retention-days: 7

  # ── Stage 2: Auto-Fix (low risk only) ─────────────────
  autofix:
    name: "Auto-Fix"
    needs: analyze
    if: |
      needs.analyze.outputs.has_improvements == 'true' &&
      needs.analyze.outputs.risk_score < 8 &&
      inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changes_made: ${{ steps.fix.outputs.changes_made }}
      branch: ${{ steps.fix.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create branch
        run: |
          BRANCH="claude/agent-team-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git config user.name "autopilot[bot]"
          git config user.email "autopilot[bot]@users.noreply.github.com"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Apply safe fixes
        id: fix
        run: |
          set -euo pipefail
          CHANGES=0

          # Fix 1: Upgrade deprecated action versions (uses: lines only)
          for f in .github/workflows/*.yml; do
            BEFORE=$(cat "$f")
            sed -i -E 's|(^\s+uses:\s+actions/checkout)@v3|\1@v4|g' "$f"
            sed -i -E 's|(^\s+uses:\s+actions/setup-node)@v3|\1@v4|g' "$f"
            sed -i -E 's|(^\s+uses:\s+actions/cache)@v3|\1@v4|g' "$f"
            sed -i -E 's|(^\s+uses:\s+actions/upload-artifact)@v3|\1@v4|g' "$f"
            sed -i -E 's|(^\s+uses:\s+actions/download-artifact)@v3|\1@v4|g' "$f"
            AFTER=$(cat "$f")
            [ "$BEFORE" != "$AFTER" ] && CHANGES=$((CHANGES + 1))
          done

          echo "changes_made=$( [ $CHANGES -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Applied $CHANGES fixes"

      - name: Validate all changes
        if: steps.fix.outputs.changes_made == 'true'
        run: |
          ERRORS=0
          for f in .github/workflows/*.yml; do
            if ! python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null; then
              echo "::error ::Fix broke: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            git checkout -- .github/workflows/
            echo "::error ::Rolled back all changes due to validation failure"
            exit 1
          fi

      - name: Bump version + CHANGELOG
        if: steps.fix.outputs.changes_made == 'true'
        run: |
          bash scripts/version-bump.sh patch
          NEW_VER=$(jq -r '.version' version.json)

          # Prepend CHANGELOG entry
          TEMP=$(mktemp)
          {
            head -6 CHANGELOG.md
            echo ""
            echo "## [$NEW_VER] - $(date +%Y-%m-%d)"
            echo ""
            echo "### Fixed"
            echo "- Agent team auto-improvements (orchestrator cycle $(date +%Y%m%d))"
            echo "- Deprecated actions: ${{ needs.analyze.outputs.deprecated_count }} fixed"
            echo "- Applied by: Agent Team Orchestrator (autonomous)"
            tail -n +7 CHANGELOG.md
          } > "$TEMP"
          mv "$TEMP" CHANGELOG.md

      - name: Commit and push
        if: steps.fix.outputs.changes_made == 'true'
        run: |
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "fix: agent team auto-improvements v$(jq -r .version version.json)

          Autonomous fixes: deprecated=${{ needs.analyze.outputs.deprecated_count }} permissions=${{ needs.analyze.outputs.missing_perm_count }}
          Risk score: ${{ needs.analyze.outputs.risk_score }}/10
          [agent-team-orchestrator]"
          git push -u origin "$BRANCH"

      - name: Create PR
        if: steps.fix.outputs.changes_made == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "fix: Agent team auto-improvements v$(jq -r .version version.json)" \
            --body "## Autonomous Agent Improvements

          **Risk Score**: ${{ needs.analyze.outputs.risk_score }}/10
          **Findings**: ${{ needs.analyze.outputs.improvement_count }} total

          | Domain | Fixed |
          |--------|-------|
          | Deprecated actions | ${{ needs.analyze.outputs.deprecated_count }} |
          | Missing permissions | ${{ needs.analyze.outputs.missing_perm_count }} |
          | Security | ${{ needs.analyze.outputs.security_count }} |
          | Quality | ${{ needs.analyze.outputs.quality_count }} |

          ### Validation
          - [x] All YAML validated post-fix
          - [x] Version bumped
          - [x] CHANGELOG entry added
          - [x] Risk score < 8 (auto-fix threshold)

          *Autonomous improvement by Agent Team Orchestrator.*" \
            --base main --head "$BRANCH"

  # ── Stage 3: Escalate (high risk) ─────────────────────
  escalate:
    name: "Escalate"
    needs: analyze
    if: needs.analyze.outputs.risk_score >= 8
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Create escalation issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "agent-team,needs-review" --state open --limit 1 --json number --jq '.[0].number // empty')
          BODY="## Agent Team Escalation ($(date -u +%Y-%m-%dT%H:%M:%SZ))

          **Risk Score**: ${{ needs.analyze.outputs.risk_score }}/10

          | Domain | Count |
          |--------|-------|
          | Security | ${{ needs.analyze.outputs.security_count }} |
          | Quality | ${{ needs.analyze.outputs.quality_count }} |
          | Deprecated | ${{ needs.analyze.outputs.deprecated_count }} |
          | Missing permissions | ${{ needs.analyze.outputs.missing_perm_count }} |

          Risk score exceeds auto-fix threshold (>=8). Manual review required.

          *Escalated by Agent Team Orchestrator*"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "[Agent Team] High-risk findings (risk ${{ needs.analyze.outputs.risk_score }}/10)" \
              --label "agent-team,needs-review,priority-high" \
              --body "$BODY"
          fi

  # ── Stage 4: Summary ──────────────────────────────────
  summary:
    name: "Summary"
    needs: [analyze, autofix, escalate]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report
        run: |
          echo "## Agent Team Orchestrator" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Findings | ${{ needs.analyze.outputs.improvement_count || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Risk | ${{ needs.analyze.outputs.risk_score || '0' }}/10 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Auto-fix applied | ${{ needs.autofix.outputs.changes_made || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Escalated | ${{ needs.escalate.result == 'success' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | #${{ github.run_number }} |" >> "$GITHUB_STEP_SUMMARY"
