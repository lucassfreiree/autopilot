name: "[Core] Sync Community Intelligence"

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force update even if no new commits"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-community-resources
  cancel-in-progress: false

jobs:
  check-updates:
    name: Check for updates
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.compare.outputs.has_updates }}
      update_summary: ${{ steps.compare.outputs.update_summary }}
    steps:
      - name: Checkout autopilot
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Fetch current sync state
        id: state
        run: |
          git fetch origin autopilot-state 2>/dev/null || true
          SYNC_FILE=$(git show origin/autopilot-state:state/community-resources-sync.json 2>/dev/null || echo '{}')
          echo "sync_state<<EOF" >> $GITHUB_OUTPUT
          echo "$SYNC_FILE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check upstream commits
        id: compare
        env:
          FORCE_UPDATE: ${{ inputs.force_update || 'false' }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          UPDATES=""
          HAS_UPDATES="false"

          # Sources to monitor (NO corporate data — public repos only)
          declare -A SOURCES
          SOURCES["anthropics/skills"]="anthropics_skills"
          SOURCES["hesreallyhim/awesome-claude-code"]="awesome_claude_code"
          SOURCES["hesreallyhim/a-list-of-claude-code-agents"]="a_list_agents"

          for REPO in "${!SOURCES[@]}"; do
            KEY="${SOURCES[$REPO]}"
            # Get latest commit via GitHub API (authenticated = higher rate limit)
            LATEST=$(gh api "repos/${REPO}/commits?per_page=1" --jq '.[0] | {sha: .sha[:8], date: .commit.committer.date, message: .commit.message | split("\n")[0]}' 2>/dev/null || echo '{}')
            LATEST_SHA=$(echo "$LATEST" | jq -r '.sha // "unknown"')
            LATEST_DATE=$(echo "$LATEST" | jq -r '.date // "unknown"')
            LATEST_MSG=$(echo "$LATEST" | jq -r '.message // "unknown"')

            # Get stored SHA
            STORED_SHA=$(echo '${{ steps.state.outputs.sync_state }}' | jq -r ".sources[] | select(.name == \"${REPO}\") | .lastCommit" 2>/dev/null || echo "")

            echo "Repo: $REPO | Latest: $LATEST_SHA | Stored: $STORED_SHA"

            if [ "$LATEST_SHA" != "$STORED_SHA" ] || [ "$FORCE_UPDATE" = "true" ]; then
              HAS_UPDATES="true"
              UPDATES="${UPDATES}${REPO}: ${LATEST_SHA} (${LATEST_DATE}) — ${LATEST_MSG}\n"
            fi
          done

          echo "has_updates=$HAS_UPDATES" >> $GITHUB_OUTPUT
          echo "update_summary<<EOF" >> $GITHUB_OUTPUT
          printf "$UPDATES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Has updates: $HAS_UPDATES"
          printf "Updates:\n$UPDATES"

  sync-and-apply:
    name: Sync intelligence
    runs-on: ubuntu-latest
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    steps:
      - name: Checkout autopilot
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "autopilot-sync[bot]"
          git config user.email "autopilot@users.noreply.github.com"

      - name: Fetch skills from anthropics/skills
        id: fetch_skills
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          echo "=== Fetching anthropics/skills ==="
          mkdir -p .sync-tmp/anthropics-skills

          # Get latest commit info
          LATEST=$(gh api "repos/anthropics/skills/commits?per_page=1" --jq '.[0] | {sha: .sha, date: .commit.committer.date}' 2>/dev/null || echo '{}')
          SHA=$(echo "$LATEST" | jq -r '.sha // "unknown"')
          DATE=$(echo "$LATEST" | jq -r '.date // "unknown"')

          # Fetch skill list
          SKILLS=$(gh api "repos/anthropics/skills/contents/skills" --jq '.[].name' 2>/dev/null || echo "")

          echo "Found skills: $SKILLS"
          echo "skills_sha=$SHA" >> $GITHUB_OUTPUT
          echo "skills_date=$DATE" >> $GITHUB_OUTPUT

          # Fetch each SKILL.md for relevant skills
          for SKILL in $SKILLS; do
            CONTENT=$(gh api "repos/anthropics/skills/contents/skills/${SKILL}/SKILL.md" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
            if [ -n "$CONTENT" ]; then
              # SECURITY: Strip any potential secrets or internal patterns before saving
              SANITIZED=$(echo "$CONTENT" | grep -v -E "(intranet\.|password|secret|token|api_key|private_key)" || echo "$CONTENT")
              echo "$SANITIZED" > ".sync-tmp/anthropics-skills/${SKILL}.md"
              echo "Fetched: $SKILL"
            fi
          done

      - name: Fetch highlights from awesome-claude-code
        id: fetch_awesome
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          echo "=== Fetching awesome-claude-code ==="
          LATEST=$(gh api "repos/hesreallyhim/awesome-claude-code/commits?per_page=1" --jq '.[0] | {sha: .sha, date: .commit.committer.date}' 2>/dev/null || echo '{}')
          SHA=$(echo "$LATEST" | jq -r '.sha // "unknown"')
          DATE=$(echo "$LATEST" | jq -r '.date // "unknown"')

          # Fetch README for extracting new tools/hooks/skills
          README=$(gh api "repos/hesreallyhim/awesome-claude-code/contents/README.md" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")

          if [ -n "$README" ]; then
            # Extract only the hooks and skills sections (no corporate data risk)
            echo "$README" | awk '/## Agent Skills/,/## Workflows/' > .sync-tmp/awesome-hooks.md 2>/dev/null || true
            echo "$README" | awk '/## Hooks/,/## Slash-Commands/' >> .sync-tmp/awesome-hooks.md 2>/dev/null || true
          fi

          echo "awesome_sha=$SHA" >> $GITHUB_OUTPUT
          echo "awesome_date=$DATE" >> $GITHUB_OUTPUT

      - name: Fetch a-list-of-claude-code-agents
        id: fetch_agents
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          echo "=== Fetching a-list-of-claude-code-agents ==="
          LATEST=$(gh api "repos/hesreallyhim/a-list-of-claude-code-agents/commits?per_page=1" --jq '.[0] | {sha: .sha, date: .commit.committer.date}' 2>/dev/null || echo '{}')
          SHA=$(echo "$LATEST" | jq -r '.sha // "unknown"')
          DATE=$(echo "$LATEST" | jq -r '.date // "unknown"')

          README=$(gh api "repos/hesreallyhim/a-list-of-claude-code-agents/contents/README.md" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
          if [ -n "$README" ]; then
            echo "$README" > .sync-tmp/agents-list.md
          fi

          echo "agents_sha=$SHA" >> $GITHUB_OUTPUT
          echo "agents_date=$DATE" >> $GITHUB_OUTPUT

      - name: Validate fetched content (security scan)
        run: |
          echo "=== Security validation of fetched content ==="
          ISSUES=0

          # Check for potential secrets or corporate data leaks in fetched content
          PATTERNS="intranet\.|password\s*=|secret\s*=|api_key\s*=|private_key|BEGIN RSA|BEGIN EC"

          for FILE in $(find .sync-tmp -name "*.md" -o -name "*.json" 2>/dev/null); do
            HITS=$(grep -cE "$PATTERNS" "$FILE" 2>/dev/null || echo 0)
            if [ "$HITS" -gt 0 ]; then
              echo "::warning::Potential sensitive content in $FILE — stripping before apply"
              grep -vE "$PATTERNS" "$FILE" > "${FILE}.clean" && mv "${FILE}.clean" "$FILE"
              ISSUES=$((ISSUES + 1))
            fi
          done

          echo "Security scan complete. Issues found and cleaned: $ISSUES"

      - name: Generate intelligence report
        run: |
          mkdir -p .claude/intelligence
          python3 -c "
          content = '''# Community Intelligence Sync Report

          Auto-generated by sync-community-resources.yml.
          This file summarizes the latest intelligence from monitored community sources.
          Corporate data is NEVER included here.

          ## Monitored Sources

          | Source | Purpose |
          |--------|---------|
          | anthropics/skills | Official Anthropic skill patterns and best practices |
          | awesome-claude-code | Community hooks, slash commands, CLAUDE.md patterns |
          | a-list-of-claude-code-agents | Agent orchestration patterns |

          ## Active Skills

          - devops-sre-cloud.md: DevOps/SRE/Cloud Engineering (custom, community-inspired)
          - observability.md: Metrics/Logs/Traces/Alerting (custom, community-inspired)
          - security-expert.md: Security Engineering (Trail of Bits inspired)

          ## Security Boundary

          All external content is validated before applying.
          No corporate identifiers, secrets, tokens, or prompt injection patterns.
          Changes require PR review with compliance-gate.
          '''
          import textwrap
          with open('.claude/intelligence/community-sync-report.md', 'w') as f:
              f.write(textwrap.dedent(content))
          "

      - name: Update sync state on autopilot-state
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          SKILLS_SHA: ${{ steps.fetch_skills.outputs.skills_sha }}
          SKILLS_DATE: ${{ steps.fetch_skills.outputs.skills_date }}
          AWESOME_SHA: ${{ steps.fetch_awesome.outputs.awesome_sha }}
          AWESOME_DATE: ${{ steps.fetch_awesome.outputs.awesome_date }}
          AGENTS_SHA: ${{ steps.fetch_agents.outputs.agents_sha }}
          AGENTS_DATE: ${{ steps.fetch_agents.outputs.agents_date }}
        run: |
          # Build new sync state JSON
          SYNC_JSON=$(jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg skills_sha "$SKILLS_SHA" \
            --arg skills_date "$SKILLS_DATE" \
            --arg awesome_sha "$AWESOME_SHA" \
            --arg awesome_date "$AWESOME_DATE" \
            --arg agents_sha "$AGENTS_SHA" \
            --arg agents_date "$AGENTS_DATE" \
            '{
              lastSync: $ts,
              sources: [
                {name: "anthropics/skills", lastCommit: $skills_sha, lastCommitDate: $skills_date},
                {name: "hesreallyhim/awesome-claude-code", lastCommit: $awesome_sha, lastCommitDate: $awesome_date},
                {name: "hesreallyhim/a-list-of-claude-code-agents", lastCommit: $agents_sha, lastCommitDate: $agents_date}
              ]
            }')

          # Encode for GitHub API
          CONTENT_B64=$(echo "$SYNC_JSON" | base64 -w 0)

          # Get current file SHA if exists (needed for update)
          CURRENT_SHA=$(gh api "repos/lucassfreiree/autopilot/contents/state/community-resources-sync.json?ref=autopilot-state" --jq '.sha' 2>/dev/null || echo "")

          # Build API request
          if [ -n "$CURRENT_SHA" ]; then
            gh api "repos/lucassfreiree/autopilot/contents/state/community-resources-sync.json" \
              --method PUT \
              --field message="chore: update community resources sync state [skip ci]" \
              --field content="$CONTENT_B64" \
              --field sha="$CURRENT_SHA" \
              --field branch="autopilot-state" > /dev/null
          else
            gh api "repos/lucassfreiree/autopilot/contents/state/community-resources-sync.json" \
              --method PUT \
              --field message="chore: init community resources sync state [skip ci]" \
              --field content="$CONTENT_B64" \
              --field branch="autopilot-state" > /dev/null
          fi

          echo "Sync state updated on autopilot-state branch"

      - name: Commit and push intelligence updates
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          SKILLS_SHA_CM: ${{ steps.fetch_skills.outputs.skills_sha }}
          AWESOME_SHA_CM: ${{ steps.fetch_awesome.outputs.awesome_sha }}
          AGENTS_SHA_CM: ${{ steps.fetch_agents.outputs.agents_sha }}
          UPDATE_SUMMARY: ${{ needs.check-updates.outputs.update_summary }}
        run: |
          if git diff --quiet .claude/ 2>/dev/null && git diff --staged --quiet .claude/ 2>/dev/null; then
            echo "No file changes in .claude/ -- skipping commit"
            exit 0
          fi

          BRANCH="claude/sync-community-$(date +%Y%m%d)"
          git checkout -B "$BRANCH"
          git add .claude/intelligence/ .claude/skills/ 2>/dev/null || true
          COMMIT_MSG="[claude] chore: sync community intelligence (skills=${SKILLS_SHA_CM}, awesome=${AWESOME_SHA_CM}, agents=${AGENTS_SHA_CM})"
          git commit -m "$COMMIT_MSG"
          git push -u origin "$BRANCH"

          PR_BODY="Community Intelligence Sync. Sources: anthropics/skills (${SKILLS_SHA_CM}), awesome-claude-code (${AWESOME_SHA_CM}), a-list-agents (${AGENTS_SHA_CM}). Security validated."
          gh pr create \
            --title "chore: sync community intelligence $(date +%Y-%m-%d)" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH" \
            --label "auto-sync,intelligence" 2>/dev/null || echo "PR creation skipped (may already exist)"

  no-updates:
    name: No updates needed
    runs-on: ubuntu-latest
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'false'
    steps:
      - name: Log
        run: echo "All community sources are up to date. No sync needed."
