name: export-dry-run

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dry-run export
        shell: pwsh
        run: |
          ./scripts/export-product-snapshot.ps1 -SourceRoot . -ProductRoot . -WhatIf -SkipValidation
