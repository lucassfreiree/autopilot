name: "[Core] Autonomy Improver"
run-name: "${{ github.workflow }} • analyze & improve"

# SELF-IMPROVING AUTONOMY ENGINE
# Goal: Drive intervention rate to ZERO.
#
# How it works:
# 1. Reads autonomy-tracker.json (populated by report-status.yml)
# 2. Identifies workflows with low autonomy rates (needed intervention)
# 3. Analyzes WHY intervention was needed (from improvement log)
# 4. Generates improvement recommendations
# 5. For known patterns: auto-fixes the workflow (creates PR)
# 6. For unknown patterns: creates @claude issue with full context
# 7. Tracks improvement over time (before/after metrics)
#
# The loop: intervention → logged → analyzed → improved → fewer interventions
# Target: 100% autonomy rate across all workflows

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode"
        type: choice
        options: [analyze, improve, report]
        default: analyze

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomy-improver
  cancel-in-progress: true

env:
  REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state

jobs:
  analyze-and-improve:
    name: "Analyze & Improve Autonomy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: "1. Read autonomy tracker"
        id: read
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -e

          # Read autonomy tracker
          TRACKER=$(gh api "repos/$REPO/contents/state/autonomy-tracker.json?ref=$STATE_BRANCH" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{"globalStats":{"totalRuns":0,"totalInterventions":0,"autonomyRate":100},"workflows":{},"improvementLog":[]}')

          GLOBAL_RATE=$(echo "$TRACKER" | jq -r '.globalStats.autonomyRate')
          TOTAL_RUNS=$(echo "$TRACKER" | jq -r '.globalStats.totalRuns')
          TOTAL_INT=$(echo "$TRACKER" | jq -r '.globalStats.totalInterventions')

          echo "::notice ::Global autonomy: ${GLOBAL_RATE}% ($TOTAL_INT interventions in $TOTAL_RUNS runs)"

          # Find workflows with < 100% autonomy
          LOW_AUTONOMY=$(echo "$TRACKER" | jq -c '[.workflows | to_entries[] | select(.value.autonomyRate < 100) | {name: .key, rate: .value.autonomyRate, interventions: .value.interventions, runs: .value.totalRuns, lastIntervention: .value.lastIntervention}] | sort_by(.value.autonomyRate)')

          LOW_COUNT=$(echo "$LOW_AUTONOMY" | jq 'length')
          echo "::notice ::Workflows needing improvement: $LOW_COUNT"

          # Get open improvement items
          OPEN_IMPROVEMENTS=$(echo "$TRACKER" | jq -c '[.improvementLog[] | select(.status == "open")]')
          OPEN_COUNT=$(echo "$OPEN_IMPROVEMENTS" | jq 'length')

          echo "global_rate=$GLOBAL_RATE" >> "$GITHUB_OUTPUT"
          echo "total_runs=$TOTAL_RUNS" >> "$GITHUB_OUTPUT"
          echo "low_count=$LOW_COUNT" >> "$GITHUB_OUTPUT"
          echo "open_count=$OPEN_COUNT" >> "$GITHUB_OUTPUT"
          echo "tracker_b64=$(echo "$TRACKER" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: "2. Read last 7 days of status ledgers"
        id: history
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -e
          TOTAL_SUCCESS=0
          TOTAL_FAILURE=0
          TOTAL_INTERVENTIONS=0

          for i in $(seq 0 6); do
            DAY=$(date -u -d "$i days ago" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d 2>/dev/null || echo "")
            [ -z "$DAY" ] && continue

            LEDGER=$(gh api "repos/$REPO/contents/state/status-ledger/${DAY}.json?ref=$STATE_BRANCH" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{"summary":{"success":0,"failure":0,"interventions":0}}')

            S=$(echo "$LEDGER" | jq -r '.summary.success // 0')
            F=$(echo "$LEDGER" | jq -r '.summary.failure // 0')
            I=$(echo "$LEDGER" | jq -r '.summary.interventions // 0')

            TOTAL_SUCCESS=$((TOTAL_SUCCESS + S))
            TOTAL_FAILURE=$((TOTAL_FAILURE + F))
            TOTAL_INTERVENTIONS=$((TOTAL_INTERVENTIONS + I))
          done

          WEEK_TOTAL=$((TOTAL_SUCCESS + TOTAL_FAILURE))
          WEEK_RATE=100
          if [ "$WEEK_TOTAL" -gt 0 ]; then
            WEEK_RATE=$(( (WEEK_TOTAL - TOTAL_INTERVENTIONS) * 100 / WEEK_TOTAL ))
          fi

          echo "week_success=$TOTAL_SUCCESS" >> "$GITHUB_OUTPUT"
          echo "week_failure=$TOTAL_FAILURE" >> "$GITHUB_OUTPUT"
          echo "week_interventions=$TOTAL_INTERVENTIONS" >> "$GITHUB_OUTPUT"
          echo "week_rate=$WEEK_RATE" >> "$GITHUB_OUTPUT"

          echo "::notice ::7-day stats: $TOTAL_SUCCESS success, $TOTAL_FAILURE failure, $TOTAL_INTERVENTIONS interventions (${WEEK_RATE}% autonomy)"

      - name: "3. Analyze intervention patterns & auto-improve"
        id: improve
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -e
          TRACKER=$(echo "${{ steps.read.outputs.tracker_b64 }}" | base64 -d 2>/dev/null)
          IMPROVEMENTS_MADE=0
          MATCHED=0
          UNMATCHED=0
          RECOMMENDATIONS=""
          UNMATCHED_ITEMS=""

          # Load resilience patterns from contract
          RESILIENCE=$(cat contracts/resilience-patterns.json 2>/dev/null || echo '{"patterns":[]}')
          PATTERN_COUNT=$(echo "$RESILIENCE" | jq '.patterns | length')
          echo "::notice ::Loaded $PATTERN_COUNT resilience patterns"

          # Load session memory error recovery patterns
          MEMORY_PATTERNS=$(jq -r '.commonPatterns.errorRecovery // {} | keys[]' contracts/claude-session-memory.json 2>/dev/null || echo "")

          # Analyze each open improvement item against resilience patterns
          ITEMS_FILE=$(mktemp)
          echo "$TRACKER" | jq -c '.improvementLog[] | select(.status == "open")' 2>/dev/null > "$ITEMS_FILE" || true

          while IFS= read -r item; do
            [ -z "$item" ] && continue
            WF=$(echo "$item" | jq -r '.workflow')
            REASON=$(echo "$item" | jq -r '.reason')
            echo "::notice ::Analyzing: $WF — $REASON"

            # Step 1: Match against resilience-patterns.json (trigger regex + strategy keywords + category)
            PATTERN_MATCH=""
            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              TRIGGER=$(echo "$pattern" | jq -r '.trigger')
              STRATEGY=$(echo "$pattern" | jq -r '.workaround.strategy')
              CATEGORY=$(echo "$pattern" | jq -r '.category')
              PID_CHECK=$(echo "$pattern" | jq -r '.id')

              # Match 1: regex trigger against reason
              if echo "$REASON" | grep -qiE "$TRIGGER" 2>/dev/null; then
                PATTERN_MATCH="$pattern"
                break
              fi
              # Match 2: workflow name contains category
              if echo "$WF" | grep -qiF "$CATEGORY" 2>/dev/null; then
                PATTERN_MATCH="$pattern"
                break
              fi
              # Match 3: reason keywords against strategy text
              for word in $(echo "$REASON" | tr ' .,;:!?-' '\n' | grep -E '.{4,}' | head -5); do
                if echo "$STRATEGY" | grep -qiF "$word" 2>/dev/null; then
                  PATTERN_MATCH="$pattern"
                  break 2
                fi
              done
            done < <(echo "$RESILIENCE" | jq -c '.patterns[]' 2>/dev/null)

            if [ -n "$PATTERN_MATCH" ]; then
              MATCHED=$((MATCHED + 1))
              PID=$(echo "$PATTERN_MATCH" | jq -r '.id')
              STRATEGY=$(echo "$PATTERN_MATCH" | jq -r '.workaround.strategy')
              AUTO=$(echo "$PATTERN_MATCH" | jq -r '.autoFix')
              RECOMMENDATIONS="${RECOMMENDATIONS}\n- **$WF** [$PID]: $STRATEGY (autoFix=$AUTO)"

              if [ "$AUTO" = "true" ]; then
                IMPROVEMENTS_MADE=$((IMPROVEMENTS_MADE + 1))
                echo "::notice ::Auto-fixable pattern matched: $PID for $WF"
              fi
              continue
            fi

            # Step 2: Match against session memory errorRecovery
            MEMORY_MATCH=""
            for key in $MEMORY_PATTERNS; do
              if echo "$REASON" | grep -qiF "$key" 2>/dev/null; then
                MEMORY_MATCH="$key"
                break
              fi
            done

            if [ -n "$MEMORY_MATCH" ]; then
              MATCHED=$((MATCHED + 1))
              FIX=$(jq -r ".commonPatterns.errorRecovery[\"$MEMORY_MATCH\"].fix // \"see memory\"" contracts/claude-session-memory.json 2>/dev/null)
              RECOMMENDATIONS="${RECOMMENDATIONS}\n- **$WF** [memory:$MEMORY_MATCH]: $FIX"
              continue
            fi

            # Step 3: Unmatched — needs auto-discovery
            UNMATCHED=$((UNMATCHED + 1))
            UNMATCHED_ITEMS="${UNMATCHED_ITEMS}\n- **$WF**: $REASON"
          done < "$ITEMS_FILE"
          rm -f "$ITEMS_FILE"

          echo "improvements_made=$IMPROVEMENTS_MADE" >> "$GITHUB_OUTPUT"
          echo "matched=$MATCHED" >> "$GITHUB_OUTPUT"
          echo "unmatched=$UNMATCHED" >> "$GITHUB_OUTPUT"

          # Save recommendations for report
          echo "$RECOMMENDATIONS" > /tmp/recommendations.txt
          echo "$UNMATCHED_ITEMS" > /tmp/unmatched.txt

          echo "::notice ::Pattern matching: $MATCHED matched, $UNMATCHED unmatched, $IMPROVEMENTS_MADE auto-fixable"

      - name: "4. Generate autonomy report"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -e
          GLOBAL_RATE="${{ steps.read.outputs.global_rate }}"
          WEEK_RATE="${{ steps.history.outputs.week_rate }}"
          LOW_COUNT="${{ steps.read.outputs.low_count }}"
          OPEN_COUNT="${{ steps.read.outputs.open_count }}"
          TRACKER=$(echo "${{ steps.read.outputs.tracker_b64 }}" | base64 -d 2>/dev/null)

          {
            echo "# Autonomy Report — $(date -u +%Y-%m-%d)"
            echo ""
            echo "## Goal: 100% Autonomy (Zero Claude Interventions)"
            echo ""
            echo "| Metric | Value | Target |"
            echo "|--------|-------|--------|"
            echo "| Global Autonomy Rate | **${GLOBAL_RATE}%** | 100% |"
            echo "| 7-Day Autonomy Rate | **${WEEK_RATE}%** | 100% |"
            echo "| 7-Day Success | ${{ steps.history.outputs.week_success }} | - |"
            echo "| 7-Day Failures | ${{ steps.history.outputs.week_failure }} | 0 |"
            echo "| 7-Day Interventions | ${{ steps.history.outputs.week_interventions }} | 0 |"
            echo "| Workflows < 100% | $LOW_COUNT | 0 |"
            echo "| Open Improvements | $OPEN_COUNT | 0 |"
            echo ""

            if [ "$GLOBAL_RATE" = "100" ]; then
              echo "> **FULL AUTONOMY ACHIEVED** — All workflows are self-sufficient."
            else
              echo "> **Improvement needed** — $LOW_COUNT workflow(s) still require intervention."
              echo ""
              echo "## Workflows Needing Improvement"
              echo "| Workflow | Autonomy | Runs | Interventions | Last Intervention |"
              echo "|----------|----------|------|---------------|-------------------|"
              echo "$TRACKER" | jq -r '.workflows | to_entries[] | select(.value.autonomyRate < 100) | sort_by(.value.autonomyRate) | "| \(.key) | \(.value.autonomyRate)% | \(.value.totalRuns) | \(.value.interventions) | \(.value.lastIntervention // "never") |"' 2>/dev/null || true
              echo ""
              echo "## Open Improvements"
              echo "$TRACKER" | jq -r '.improvementLog[] | select(.status == "open") | "- **\(.workflow)**: \(.reason) (\(.timestamp))"' 2>/dev/null || echo "None"
            fi

            echo ""
            echo "## Resilience Pattern Matching"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Patterns matched | ${{ steps.improve.outputs.matched }} |"
            echo "| Unmatched (needs discovery) | ${{ steps.improve.outputs.unmatched }} |"
            echo "| Auto-fixable | ${{ steps.improve.outputs.improvements_made }} |"
            echo ""
            RECS=$(cat /tmp/recommendations.txt 2>/dev/null || echo "None")
            if [ -n "$RECS" ] && [ "$RECS" != "None" ]; then
              echo "### Matched Workarounds"
              echo -e "$RECS"
            fi
            UNMATCHED_LIST=$(cat /tmp/unmatched.txt 2>/dev/null || echo "")
            if [ -n "$UNMATCHED_LIST" ]; then
              echo ""
              echo "### Unmatched — Auto-Discovery Needed"
              echo -e "$UNMATCHED_LIST"
            fi
            echo ""
            echo "## All Workflows Status"
            echo "| Workflow | Rate | Streak | Status |"
            echo "|----------|------|--------|--------|"
            echo "$TRACKER" | jq -r '.workflows | to_entries | sort_by(-.value.autonomyRate) | .[] | "| \(.key) | \(.value.autonomyRate)% | \(.value.streak) | \(if .value.autonomyRate == 100 then "✅" elif .value.autonomyRate >= 80 then "🟡" else "🔴" end) |"' 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "5. Auto-discovery: escalate unmatched patterns"
        if: steps.improve.outputs.unmatched != '0'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          UNMATCHED="${{ steps.improve.outputs.unmatched }}"
          UNMATCHED_LIST=$(cat /tmp/unmatched.txt 2>/dev/null || echo "No details")

          EXISTING=$(gh api "repos/$REPO/issues?labels=needs-claude,auto-discovery&state=open&per_page=3" \
            --jq 'length' 2>/dev/null || echo "0")
          if [ "$EXISTING" -gt 0 ]; then
            echo "::notice ::Existing auto-discovery issue — skipping"
            exit 0
          fi

          gh api "repos/$REPO/issues" --method POST \
            -f "title=🔍 Auto-discovery: $UNMATCHED unmatched failure patterns need workarounds — @claude" \
            -f "body=## Auto-Discovery Request

          The autonomy-improver found **$UNMATCHED failure pattern(s)** that don't match any known workaround in \`contracts/resilience-patterns.json\` or \`contracts/claude-session-memory.json\`.

          ### Unmatched Patterns
          $UNMATCHED_LIST

          ### Required Actions
          @claude For each unmatched pattern:
          1. Analyze the error and root cause
          2. Search for workarounds (check docs, web if needed)
          3. Implement a fix or fallback mechanism
          4. Add the new pattern to \`contracts/resilience-patterns.json\`
          5. Add to \`contracts/claude-session-memory.json\` errorRecovery
          6. Verify the workaround works

          ### Reference
          - Resilience patterns: \`contracts/resilience-patterns.json\`
          - Session memory: \`contracts/claude-session-memory.json\`
          - Fallback chains: see \`fallbackChain\` in resilience-patterns.json

          _Auto-generated by autonomy-improver auto-discovery._" \
            -f "labels=[\"needs-claude\",\"auto-discovery\",\"auto-generated\"]" 2>/dev/null || true

      - name: "6. Escalate if autonomy degrading"
        if: steps.improve.outputs.unmatched == '0' && steps.read.outputs.global_rate != '100' && fromJSON(steps.read.outputs.total_runs) > 10
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          GLOBAL_RATE="${{ steps.read.outputs.global_rate }}"
          WEEK_RATE="${{ steps.history.outputs.week_rate }}"
          OPEN_COUNT="${{ steps.read.outputs.open_count }}"
          TRACKER=$(echo "${{ steps.read.outputs.tracker_b64 }}" | base64 -d 2>/dev/null)

          # Only escalate weekly or if autonomy drops significantly
          EXISTING=$(gh api "repos/$REPO/issues?labels=needs-claude,autonomy-improvement&state=open&per_page=3" \
            --jq 'length' 2>/dev/null || echo "0")
          if [ "$EXISTING" -gt 0 ]; then
            echo "::notice ::Existing autonomy improvement issue — skipping"
            exit 0
          fi

          # Build list of problematic workflows
          PROBLEM_LIST=$(echo "$TRACKER" | jq -r '.workflows | to_entries[] | select(.value.autonomyRate < 100) | "- **\(.key)**: \(.value.autonomyRate)% autonomy (\(.value.interventions) interventions in \(.value.totalRuns) runs)"' 2>/dev/null || echo "- Unknown")

          IMPROVEMENT_LIST=$(echo "$TRACKER" | jq -r '.improvementLog[] | select(.status == "open") | "- \(.workflow): \(.reason)"' 2>/dev/null | head -10 || echo "- None")

          gh api "repos/$REPO/issues" --method POST \
            -f "title=📊 Autonomy at ${GLOBAL_RATE}% — improve workflows to reduce interventions" \
            -f "body=## Autonomy Improvement Needed

          **Global Rate**: ${GLOBAL_RATE}%
          **7-Day Rate**: ${WEEK_RATE}%
          **Open Improvements**: $OPEN_COUNT

          ### Workflows Needing Improvement
          $PROBLEM_LIST

          ### Open Improvement Items
          $IMPROVEMENT_LIST

          ### Goal
          Every workflow that requires @claude intervention is a bug in the automation. The target is **100% autonomy** where all workflows self-heal without any manual input.

          @claude Please:
          1. Analyze each workflow with < 100% autonomy
          2. Identify the root cause of interventions
          3. Implement fixes so the workflow handles the failure automatically
          4. Verify the fix works and mark improvements as resolved
          5. The ultimate goal: this issue type should never be created again

          Reference: \`state/autonomy-tracker.json\`, \`state/status-ledger/\` on autopilot-state" \
            -f "labels=[\"needs-claude\",\"autonomy-improvement\",\"auto-generated\"]" 2>/dev/null || echo "::warning ::Failed to create issue"
