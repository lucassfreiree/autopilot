name: "[Core] Escalate to @claude"
run-name: "${{ github.workflow }} • ${{ inputs.source }} • ${{ inputs.severity }}"

# CENTRAL ESCALATION HUB — called by ANY workflow that detects a failure.
# Creates a GitHub Issue with @claude mention so Claude Code is automatically notified.
# Deduplicates: won't create a new issue if an open one already exists for the same source.

on:
  workflow_call:
    inputs:
      source:
        description: "Which workflow is escalating (e.g., health-check, ci-diagnose)"
        type: string
        required: true
      severity:
        description: "critical, high, medium, low"
        type: string
        required: true
        default: "high"
      title:
        description: "Issue title (without @claude — added automatically)"
        type: string
        required: true
      body:
        description: "Issue body with full context"
        type: string
        required: true
      component:
        description: "controller, agent, or autopilot"
        type: string
        required: false
        default: "autopilot"
      dedup_label:
        description: "Label used to deduplicate issues (e.g., ci-diagnosis, health-critical)"
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      source:
        description: "Source workflow"
        required: true
      severity:
        description: "Severity"
        type: choice
        options: [critical, high, medium, low]
        default: high
      title:
        description: "Issue title"
        required: true
      body:
        description: "Issue body"
        required: true
      component:
        description: "Component"
        type: choice
        options: [controller, agent, autopilot]
        default: autopilot
      dedup_label:
        description: "Dedup label"
        required: false

permissions:
  issues: write
  contents: read

concurrency:
  group: escalate-${{ inputs.source }}-${{ inputs.dedup_label || inputs.title }}
  cancel-in-progress: false

jobs:
  escalate:
    name: "Create @claude issue"
    runs-on: ubuntu-latest
    steps:
      - name: "Check for duplicate issues"
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          DEDUP="${{ inputs.dedup_label }}"
          if [ -z "$DEDUP" ]; then
            DEDUP="${{ inputs.source }}"
          fi

          # Check open issues with same dedup label
          EXISTING=$(gh api "repos/${{ github.repository }}/issues?labels=needs-claude,${DEDUP}&state=open&per_page=5" \
            --jq 'length' 2>/dev/null || echo "0")

          if [ "$EXISTING" -gt 0 ]; then
            echo "::notice ::Existing open issue found for $DEDUP — skipping duplicate"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Create escalation issue"
        if: steps.dedup.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          SEVERITY="${{ inputs.severity }}"
          SOURCE="${{ inputs.source }}"
          COMPONENT="${{ inputs.component }}"
          DEDUP="${{ inputs.dedup_label }}"
          [ -z "$DEDUP" ] && DEDUP="$SOURCE"

          # Severity emoji
          case "$SEVERITY" in
            critical) EMOJI="🚨" ;;
            high)     EMOJI="🔴" ;;
            medium)   EMOJI="🟡" ;;
            low)      EMOJI="🔵" ;;
            *)        EMOJI="⚠️" ;;
          esac

          TITLE="$EMOJI ${{ inputs.title }} — @claude"

          BODY="${{ inputs.body }}

          ---
          **Escalation Metadata**
          | Field | Value |
          |-------|-------|
          | Source | \`$SOURCE\` |
          | Severity | $SEVERITY |
          | Component | $COMPONENT |
          | Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |
          | Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          _Auto-generated by escalate-to-claude workflow. @claude please investigate and resolve._"

          LABELS="needs-claude,$DEDUP,auto-generated,$SEVERITY"

          gh api "repos/${{ github.repository }}/issues" --method POST \
            -f "title=$TITLE" \
            -f "body=$BODY" \
            -f "labels=[\"needs-claude\",\"$DEDUP\",\"auto-generated\",\"$SEVERITY\"]" 2>/dev/null || {
            echo "::error ::Failed to create escalation issue"
            exit 1
          }

          echo "::notice ::Escalation issue created: $TITLE"
