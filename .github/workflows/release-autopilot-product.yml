# ===========================================================
# Autopilot Product Release Pipeline
#
# Triggered by version.json changes on main.
# Validates → creates git tag → creates GitHub Release
# → persists state on autopilot-state branch.
# ===========================================================
name: "[Release] Autopilot Product"

on:
  push:
    branches: [main]
    paths: ['version.json']
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if tag exists'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: autopilot-product-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error ::version.json missing version field"
            exit 1
          fi
          # Enforce semver format
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error ::Invalid version: $VERSION"
            exit 1
          fi
          # Enforce patch <= 9
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          if [ "$PATCH" -gt 9 ]; then
            echo "::error ::Patch $PATCH > 9. Use minor bump."
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check tag availability
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            if [ "${{ inputs.force_release }}" = "true" ]; then
              echo "::warning ::Tag $TAG exists but force=true"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "::notice ::Tag $TAG already exists. Skipping."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate CHANGELOG
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "\[${VERSION}\]" CHANGELOG.md; then
            echo "::error ::CHANGELOG.md missing entry for $VERSION"
            exit 1
          fi

      - name: Validate YAML workflows
        if: steps.check.outputs.should_release == 'true'
        run: |
          ERRORS=0
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null || { echo "::error ::Invalid YAML: $f"; ERRORS=$((ERRORS+1)); }
          done
          [ "$ERRORS" -eq 0 ] || exit 1

      - name: Validate JSON
        if: steps.check.outputs.should_release == 'true'
        run: |
          ERRORS=0
          for f in schemas/*.json contracts/*.json version.json; do
            [ -f "$f" ] && ! jq '.' "$f" > /dev/null 2>&1 && { echo "::error ::Invalid JSON: $f"; ERRORS=$((ERRORS+1)); }
          done
          [ "$ERRORS" -eq 0 ] || exit 1

  release:
    name: Release
    needs: validate
    if: needs.validate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          git config user.name "autopilot[bot]"
          git config user.email "autopilot[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
          [ -s /tmp/release-notes.md ] || echo "Release v${VERSION}" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.validate.outputs.tag }}" \
            --title "Autopilot ${{ needs.validate.outputs.tag }}" \
            --notes-file /tmp/release-notes.md \
            --latest

      - name: Persist state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          VERSION="${{ needs.validate.outputs.version }}"
          STATE=$(jq -n \
            --arg v "$VERSION" --arg t "$TAG" --arg s "${{ github.sha }}" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --arg r "${{ github.run_id }}" \
            '{schemaVersion:1,product:"autopilot",currentVersion:$v,currentTag:$t,releaseSha:$s,releasedAt:$ts,releaseRunId:$r}')

          ENCODED=$(echo "$STATE" | base64 -w0)
          FILE="state/autopilot-product-release.json"
          BRANCH="autopilot-state"

          FILE_SHA=$(gh api "repos/${{ github.repository }}/contents/$FILE?ref=$BRANCH" \
            --jq '.sha' 2>/dev/null || echo "")

          ARGS=(-X PUT -f "branch=$BRANCH" \
            -f "message=chore: release $TAG [skip ci]" \
            -f "content=$ENCODED")
          [ -n "$FILE_SHA" ] && ARGS+=(-f "sha=$FILE_SHA")
          gh api "repos/${{ github.repository }}/contents/$FILE" "${ARGS[@]}"

      - name: Summary
        run: |
          echo "## Release ${{ needs.validate.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ needs.validate.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | ${{ needs.validate.outputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA | ${GITHUB_SHA:0:7} |" >> "$GITHUB_STEP_SUMMARY"
