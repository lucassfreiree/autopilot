name: "[Infra] Spark Dashboard Sync"
run-name: "${{ github.workflow }} • sync state to Spark dashboard"

on:
  schedule:
    # Business hours (8h-17h BRT = 11h-20h UTC) Mon-Fri: every 5 minutes
    - cron: '*/15 11-19 * * 1-5'  # Optimized: was */5. workflow_run trigger handles real-time sync.
    # Off-hours Mon-Fri: every 15 minutes
    - cron: '*/15 0-10,20-23 * * 1-5'
    # Weekends: every 15 minutes
    - cron: '*/15 * * * 0,6'
  workflow_run:
    workflows:
      - "[Corp] Deploy: Apply Source Change"
      - "[Core] Auto-Merge Sweeper"
    types: [completed]
  push:
    branches: [main]
    paths:
      - 'contracts/claude-live-status.json'
      - 'contracts/copilot-session-memory.json'
      - 'contracts/codex-session-memory.json'
      - 'contracts/devin-session-memory.json'
      - 'trigger/source-change.json'
      - 'references/spark-dashboard/**'
  workflow_dispatch: {}
  # v2: script extracted to scripts/dashboard/collect-state.sh (fix 21000 char limit)

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

concurrency:
  group: spark-sync
  cancel-in-progress: false

jobs:
  sync:
    name: "Sync state to Spark"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Spark config
        id: config
        run: |
          SPARK_REPO=$(jq -r '.sparkApp.repo // ""' integrations/spark/config.json 2>/dev/null)
          if [ -z "$SPARK_REPO" ] || [ "$SPARK_REPO" = "" ]; then
            echo "::notice ::Spark repo not configured. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "repo=$SPARK_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect comprehensive state
        id: state
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          BBVINET_TOKEN: ${{ secrets.BBVINET_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/dashboard/collect-state.sh

      - name: Validate collected state artifact
        id: state_artifact
        run: |
          STATE_FILE="/tmp/state.json"
          STATE_B64_FILE="/tmp/state.json.b64"

          if [ ! -s "$STATE_FILE" ]; then
            echo "::error ::Collected state file missing or empty: $STATE_FILE"
            exit 1
          fi

          if ! jq empty "$STATE_FILE" > /dev/null 2>&1; then
            echo "::error ::Collected state file is not valid JSON: $STATE_FILE"
            exit 1
          fi

          STATE_SIZE=$(wc -c < "$STATE_FILE")
          if [ "$STATE_SIZE" -lt 200 ]; then
            echo "::error ::Collected state file is unexpectedly small (${STATE_SIZE} bytes)"
            exit 1
          fi

          base64 -w0 "$STATE_FILE" > "$STATE_B64_FILE"
          if [ ! -s "$STATE_B64_FILE" ]; then
            echo "::error ::Failed to base64-encode collected state"
            exit 1
          fi

          echo "state_file=$STATE_FILE" >> "$GITHUB_OUTPUT"
          echo "state_b64_file=$STATE_B64_FILE" >> "$GITHUB_OUTPUT"
          echo "::notice ::Validated state artifact (${STATE_SIZE} bytes)"

      - name: Push state to Spark repo
        if: steps.config.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          SPARK_REPO="${{ steps.config.outputs.repo }}"
          STATE_FILE="${{ steps.state_artifact.outputs.state_file }}"
          STATE_B64_FILE="${{ steps.state_artifact.outputs.state_b64_file }}"
          PAYLOAD_FILE="/tmp/spark-state-payload.json"

          if [ ! -s "$STATE_FILE" ] || [ ! -s "$STATE_B64_FILE" ]; then
            echo "::error ::Validated state artifact missing before Spark push"
            exit 1
          fi

          EXISTING_SHA=$(gh api "repos/$SPARK_REPO/contents/public/state.json" --jq '.sha' 2>/dev/null || echo "")

          jq -n \
            --rawfile content "$STATE_B64_FILE" \
            --arg sha "$EXISTING_SHA" \
            --arg message "chore: sync autopilot state [automated]" \
            '{message: $message, content: $content} + (if $sha != "" then {sha: $sha} else {} end)' \
            > "$PAYLOAD_FILE"

          if gh api "repos/$SPARK_REPO/contents/public/state.json" \
            --method PUT \
            --input "$PAYLOAD_FILE" > /dev/null 2>&1; then
            echo "::notice ::State synced to $SPARK_REPO"
          else
            echo "::error ::Failed to push state to $SPARK_REPO"
            exit 1
          fi

      - name: Push dashboard HTML to Spark repo
        if: steps.config.outputs.skip != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          SPARK_REPO="${{ steps.config.outputs.repo }}"
          HTML_FILE="references/spark-dashboard/public/index.html"
          HTML_B64_FILE="/tmp/spark-dashboard-index.html.b64"
          PAYLOAD_FILE="/tmp/spark-dashboard-index-payload.json"

          if [ ! -f "$HTML_FILE" ]; then
            echo "::notice ::Dashboard HTML not found at $HTML_FILE — skipping"
            exit 0
          fi

          base64 -w0 "$HTML_FILE" > "$HTML_B64_FILE"
          EXISTING_SHA=$(gh api "repos/$SPARK_REPO/contents/public/index.html" --jq '.sha' 2>/dev/null || echo "")

          jq -n \
            --rawfile content "$HTML_B64_FILE" \
            --arg sha "$EXISTING_SHA" \
            --arg message "chore: sync dashboard UI [automated]" \
            '{message: $message, content: $content} + (if $sha != "" then {sha: $sha} else {} end)' \
            > "$PAYLOAD_FILE"

          gh api "repos/$SPARK_REPO/contents/public/index.html" \
            --method PUT \
            --input "$PAYLOAD_FILE" > /dev/null 2>&1 && \
            echo "::notice ::Dashboard HTML synced to $SPARK_REPO" || \
            echo "::warning ::Failed to push dashboard HTML to $SPARK_REPO (non-critical)"

      - name: Update panel/dashboard/state.json on main
        if: steps.state_artifact.outputs.state_file != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          STATE_FILE="${{ steps.state_artifact.outputs.state_file }}"
          STATE_B64_FILE="${{ steps.state_artifact.outputs.state_b64_file }}"
          CURRENT_B64_FILE="/tmp/current-panel-state.json.b64"
          PAYLOAD_FILE="/tmp/panel-state-payload.json"

          if [ ! -s "$STATE_FILE" ] || [ ! -s "$STATE_B64_FILE" ]; then
            echo "::error ::Validated state artifact missing before panel update"
            exit 1
          fi
          if ! jq empty "$STATE_FILE" > /dev/null 2>&1; then
            echo "::error ::Validated state file became invalid before panel update"
            exit 1
          fi

          for attempt in 1 2 3; do
            gh api "repos/$GITHUB_REPOSITORY/contents/panel/dashboard/state.json?ref=main" --jq '.content' | tr -d '\n' > "$CURRENT_B64_FILE"
            if cmp -s "$STATE_B64_FILE" "$CURRENT_B64_FILE"; then
              echo "::notice ::state.json unchanged -- skip publish"
              exit 0
            fi

            CURRENT_SHA=$(gh api "repos/$GITHUB_REPOSITORY/contents/panel/dashboard/state.json?ref=main" --jq '.sha')
            jq -n \
              --rawfile content "$STATE_B64_FILE" \
              --arg sha "$CURRENT_SHA" \
              --arg message "chore: sync dashboard state [skip ci]" \
              '{message: $message, content: $content, sha: $sha, branch: "main"}' \
              > "$PAYLOAD_FILE"

            if gh api "repos/$GITHUB_REPOSITORY/contents/panel/dashboard/state.json" \
              --method PUT \
              --input "$PAYLOAD_FILE" > /dev/null 2>&1; then
              # deploy-panel.yml auto-triggers via push path filter on panel/** — no need for explicit dispatch
              echo "::notice ::Updated panel/dashboard/state.json on main (deploy-panel auto-triggers via push path)"
              exit 0
            fi

            echo "::warning ::Attempt $attempt to update panel/dashboard/state.json failed; retrying"
            sleep 2
          done

          echo "::error ::Failed to update panel/dashboard/state.json on main after retries"
          exit 1
